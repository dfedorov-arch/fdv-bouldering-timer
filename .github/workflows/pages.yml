name: Publish project website

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "help.html"
      - "help-assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Assemble website
        run: |
          mkdir _site
          cp -R docs/. _site/
          cp help.html _site/help.html
          cp -R help-assets _site/help-assets

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
