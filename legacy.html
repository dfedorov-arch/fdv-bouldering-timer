<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Таймер болдеринга (упрощённый вид)</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0e1116;
      color: #f4f7fb;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.break-active {
      background: #f05a59;
      color: #f4f7fb;
    }

    body.warning-active {
      background: #0e1116;
      color: #f4f7fb;
    }

    #wrap {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      display: table;
      text-align: center;
      white-space: nowrap;
    }

    #time {
      display: table-cell;
      width: 100%;
      height: 100%;
      vertical-align: middle;
      font-size: 26vw;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

  </style>
</head>
<body>
  <div id="wrap">
    <div id="time">--:--</div>
  </div>

  <script>
    (function () {
      var state = null;
      var serverOffset = 0;
      var lastContact = 0;
      var appliedFontKey = "";
      var activeRequest = null;
      var activeRequestStartedAt = 0;
      var pollTimer = null;
      var lastFitKey = "";
      var clockSamples = [];
      var maxClockSamples = 10;
      var timerColors = {
        rotationText: "#f4f7fb",
        warningText: "#f4f7fb",
        breakText: "#f4f7fb",
        rotationBg: "#0e1116",
        warningBg: "#0e1116",
        breakBg: "#f05a59"
      };
      var manualLegacyUrl = /(?:^|[?&])manualLegacy=1(?:&|$)/.test(window.location.search || "");
      var storedClientId = "";
      var storedFitText = "";
      try {
        storedClientId = sessionStorage.getItem("boulderingTimerClientId") || "";
        storedFitText = sessionStorage.getItem("boulderingTimerLegacyFitText") || "";
      } catch (error) {}
      var clientId = queryValue("clientId") || storedClientId || ("legacy-" + String(new Date().getTime()) + "-" + String(Math.random()).slice(2));
      var isOldBrowser = !window.Promise || !window.fetch || !window.requestAnimationFrame || !window.performance;
      try {
        sessionStorage.setItem("boulderingTimerClientId", clientId);
      } catch (error) {}
      if (window.history && window.history.replaceState && window.location.search) {
        try {
          window.history.replaceState(null, document.title, window.location.pathname + window.location.hash);
        } catch (error) {}
      }
      var wrapEl = document.getElementById("wrap");
      var timeEl = document.getElementById("time");

      function viewportWidth() {
        if (window.visualViewport && window.visualViewport.width) return Math.floor(window.visualViewport.width);
        return window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth || 360;
      }

      function viewportHeight() {
        if (window.visualViewport && window.visualViewport.height) return Math.floor(window.visualViewport.height);
        return window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight || 640;
      }

      function syncViewportSize() {
        var w = viewportWidth();
        var h = viewportHeight();
        if (w < 1) w = 360;
        if (h < 1) h = 640;
        wrapEl.style.width = w + "px";
        wrapEl.style.height = h + "px";
        timeEl.style.width = w + "px";
        timeEl.style.height = h + "px";
        return { width: w, height: h };
      }

      function wideTimerText(value) {
        var text = String(value || "88:88");
        var colon = text.indexOf(":");
        var minuteDigits = colon > 0 ? colon : 2;
        var wide = "";
        var i;

        if (text === "--:--") minuteDigits = 2;
        if (minuteDigits < 2) minuteDigits = 2;
        for (i = 0; i < minuteDigits; i += 1) {
          wide += "8";
        }
        return wide + ":88";
      }

      function fitSampleText(value) {
        var text = String(value || "");
        if ((text === "" || text === "--:--") && storedFitText) return storedFitText;
        return wideTimerText(text || "88:88");
      }

      function rememberFitText(value) {
        var next = wideTimerText(value);
        if (next === storedFitText) return;
        storedFitText = next;
        try {
          sessionStorage.setItem("boulderingTimerLegacyFitText", storedFitText);
        } catch (error) {}
      }

      function fitTimerText(force) {
        var viewport = syncViewportSize();
        var w = viewport.width;
        var h = viewport.height;
        if (w < 1 || h < 1) return;
        var maxW = w * 0.985;
        var maxH = h * 0.96;
        var low = 48;
        var high = Math.min(1800, Math.max(220, w, h * 1.45));
        var i, mid, testW, testH;
        var canvas = document.createElement("canvas");
        var ctx = canvas.getContext ? canvas.getContext("2d") : null;
        var text = fitSampleText(timeEl.textContent || timeEl.innerHTML);
        var fw = timeEl.currentStyle ? timeEl.currentStyle.fontWeight : (window.getComputedStyle ? getComputedStyle(timeEl).fontWeight : "900");
        var ff = timeEl.currentStyle ? timeEl.currentStyle.fontFamily : (window.getComputedStyle ? getComputedStyle(timeEl).fontFamily : "Arial, sans-serif");
        var fitKey = w + "x" + h + "|" + text + "|" + fw + "|" + ff;
        if (!force && fitKey === lastFitKey) return;
        lastFitKey = fitKey;
        if (!ctx) {
          timeEl.style.fontSize = Math.floor(Math.min(maxH, maxW / Math.max(1, text.length * 0.62))) + "px";
          return;
        }
        for (i = 0; i < 13; i += 1) {
          mid = (low + high) / 2;
          ctx.font = fw + " " + mid + "px " + ff;
          testW = ctx.measureText(text).width;
          testH = mid;
          if (testW <= maxW && testH <= maxH) {
            low = mid;
          } else {
            high = mid;
          }
        }
        timeEl.style.fontSize = Math.floor(low) + "px";
      }

      function scheduleViewportFit() {
        fitTimerText(true);
        window.setTimeout(function () { fitTimerText(true); }, 100);
        window.setTimeout(function () { fitTimerText(true); }, 300);
        window.setTimeout(function () { fitTimerText(true); }, 700);
      }

      scheduleViewportFit();
      window.onresize = scheduleViewportFit;
      if (window.addEventListener) {
        window.addEventListener("orientationchange", scheduleViewportFit);
        if (window.visualViewport && window.visualViewport.addEventListener) {
          window.visualViewport.addEventListener("resize", scheduleViewportFit);
          window.visualViewport.addEventListener("scroll", scheduleViewportFit);
        }
      } else {
        window.onorientationchange = scheduleViewportFit;
      }

      function queryValue(name) {
        var query = String(window.location.search || "").replace(/^\?/, "").split("&");
        var prefix = name + "=";
        var i;
        for (i = 0; i < query.length; i += 1) {
          if (query[i].indexOf(prefix) === 0) {
            try {
              return decodeURIComponent(query[i].slice(prefix.length).replace(/\+/g, " "));
            } catch (error) {
              return query[i].slice(prefix.length);
            }
          }
        }
        return "";
      }

      function two(value) {
        value = Math.max(0, Math.floor(value));
        return value < 10 ? "0" + value : String(value);
      }

      function formatTime(seconds) {
        seconds = Math.max(0, Math.ceil(seconds));
        return two(seconds / 60) + ":" + two(seconds % 60);
      }

      function activeSettings() {
        var settings = state && state.activeSettings ? state.activeSettings : null;
        return {
          rotationSeconds: Number(settings && settings.rotationSeconds) || 240,
          breakSeconds: Number(settings && settings.breakSeconds) || 0,
          oneShot: Boolean(settings && settings.oneShot)
        };
      }

      function serverNow() {
        return new Date().getTime() + serverOffset;
      }

      function compareLatency(a, b) {
        return a.latency - b.latency;
      }

      function compareOffset(a, b) {
        return a.offset - b.offset;
      }

      function updateServerOffset(remoteNow, requestStartedAt, responseReceivedAt) {
        var latency;
        var midpoint;
        var fastest;
        var offsets;
        var keep;
        var i;

        remoteNow = Number(remoteNow || 0);
        if (!remoteNow) return;
        latency = Math.max(0, responseReceivedAt - requestStartedAt);
        midpoint = requestStartedAt + latency / 2;
        clockSamples.push({
          latency: latency,
          offset: remoteNow - midpoint
        });
        if (clockSamples.length > maxClockSamples) {
          clockSamples.shift();
        }

        fastest = clockSamples.slice(0);
        fastest.sort(compareLatency);
        keep = Math.min(5, fastest.length);
        offsets = [];
        for (i = 0; i < keep; i += 1) {
          offsets.push({ offset: fastest[i].offset });
        }
        offsets.sort(compareOffset);
        serverOffset = offsets[Math.floor(offsets.length / 2)].offset;
      }

      function applyTitle(language) {
        document.title = language === "en"
          ? "Bouldering timer (legacy mode)"
          : "Таймер болдеринга (упрощённый вид)";
      }

      function cssString(value) {
        return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, "\\\"");
      }

      function cssUrl(value) {
        return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, "%22").replace(/\)/g, "%29");
      }

      function colorValue(value, fallback) {
        value = String(value || "").replace(/[;"{}<>]/g, "").trim();
        return value || fallback;
      }

      function applyTimerFont(config) {
        var fontUrl = config && config.timerFontUrl ? String(config.timerFontUrl) : "";
        var fallback = config && config.timerFont ? String(config.timerFont) : "Arial, Helvetica, sans-serif";
        var key = fontUrl + "|" + fallback;
        var style;

        if (key === appliedFontKey) return;
        appliedFontKey = key;
        if (!fontUrl) {
          timeEl.style.fontFamily = fallback || "Arial, Helvetica, sans-serif";
          fitTimerText(true);
          return;
        }

        style = document.getElementById("legacyTimerFontFace");
        if (!style) {
          style = document.createElement("style");
          style.id = "legacyTimerFontFace";
          document.getElementsByTagName("head")[0].appendChild(style);
        }
        style.innerHTML = "@font-face{font-family:\"FDV Legacy Timer\";src:url(\"" + cssUrl(fontUrl) + "\");font-weight:100 900;font-style:normal;font-display:swap;}";
        timeEl.style.fontFamily = "\"FDV Legacy Timer\", " + (cssString(fallback) || "Arial, Helvetica, sans-serif");
        fitTimerText(true);
        if (window.FontFace) {
          try {
            var ff = new FontFace("FDV Legacy Timer", "url(" + cssUrl(fontUrl) + ")");
            ff.load().then(function () { fitTimerText(true); });
          } catch (e) {}
        } else {
          window.setTimeout(fitTimerText, 500);
        }
      }

      function applyTimerColors(config) {
        config = config || {};
        timerColors = {
          rotationText: colorValue(config.rotationTextColor, timerColors.rotationText),
          warningText: colorValue(config.rotationLastFiveTextColor, timerColors.warningText),
          breakText: colorValue(config.breakTextColor, timerColors.breakText),
          rotationBg: colorValue(config.rotationBackgroundColor, timerColors.rotationBg),
          warningBg: colorValue(config.rotationLastFiveBackgroundColor, timerColors.warningBg),
          breakBg: colorValue(config.breakBackgroundColor, timerColors.breakBg)
        };
      }

      function elapsedSeconds() {
        if (!state) return 0;
        if (!state.running) return Number(state.elapsedBeforePause || state.elapsed || 0) || 0;
        if (Number(state.startedAt || 0) > serverNow()) return 0;
        return Math.max(0, (serverNow() - Number(state.startedAt || 0)) / 1000);
      }

      function currentDisplay() {
        var settings = activeSettings();
        var elapsed = elapsedSeconds();
        var rotation = settings.rotationSeconds;
        var rest = settings.breakSeconds;
        var cycle = rotation + rest;
        var pos;

        if (!state) return { phase: "waiting", seconds: 0, isBreak: false, warning: false };
        if (state.countdownOnly || (state.running && Number(state.startedAt || 0) > serverNow())) {
          return {
            phase: "start",
            seconds: Math.max(0, (Number(state.startedAt || 0) - serverNow()) / 1000),
            isBreak: false,
            warning: false
          };
        }
        if (state.waitingForManualStart) return { phase: "ready", seconds: 0, isBreak: false, warning: false };
        if (state.completed) return { phase: "done", seconds: 0, isBreak: false, warning: false };
        if (!state.running && elapsed <= 0) return { phase: "ready", seconds: rotation, isBreak: false, warning: false };

        if (settings.oneShot) {
          if (elapsed < rotation) {
            return { phase: "rotation", seconds: rotation - elapsed, isBreak: false, warning: rotation - elapsed <= 5 };
          }
          if (rest > 0 && elapsed < rotation + rest) {
            return { phase: "break", seconds: rotation + rest - elapsed, isBreak: true, warning: false };
          }
          return { phase: "done", seconds: 0, isBreak: false, warning: false };
        }

        if (cycle <= 0) return { phase: "ready", seconds: 0, isBreak: false, warning: false };
        pos = elapsed % cycle;
        if (rest > 0 && pos >= rotation) {
          return { phase: "break", seconds: cycle - pos, isBreak: true, warning: false };
        }
        return { phase: "rotation", seconds: rotation - pos, isBreak: false, warning: rotation - pos <= 5 };
      }

      function render() {
        var view = currentDisplay();
        var online = new Date().getTime() - lastContact < 5000;
        document.body.className = (view.isBreak ? "break-active " : "") + (view.warning ? "warning-active " : "") + (online ? "" : "offline");
        document.body.style.backgroundColor = view.isBreak ? timerColors.breakBg : view.warning ? timerColors.warningBg : timerColors.rotationBg;
        timeEl.style.color = view.isBreak ? timerColors.breakText : view.warning ? timerColors.warningText : timerColors.rotationText;
        var label = formatTime(view.seconds);
        if (timeEl.innerHTML !== label) {
          rememberFitText(label);
          timeEl.innerHTML = label;
          fitTimerText();
        }
      }

      function scheduleRequest(delay) {
        if (pollTimer) window.clearTimeout(pollTimer);
        pollTimer = window.setTimeout(requestState, delay);
      }

      function finishRequest() {
        activeRequest = null;
        activeRequestStartedAt = 0;
      }

      function abortStaleRequest() {
        if (!activeRequest) return;
        if (new Date().getTime() - activeRequestStartedAt < 7000) return;
        try {
          activeRequest.abort();
        } catch (error) {}
        finishRequest();
      }

      function requestState() {
        var xhr = new XMLHttpRequest();
        var url = "/api/state?legacy=1" + (manualLegacyUrl ? "&manualLegacy=1" : "") + (isOldBrowser ? "&oldBrowser=1" : "") + "&clientId=" + encodeURIComponent(clientId);
        abortStaleRequest();
        if (activeRequest) return;
        activeRequest = xhr;
        activeRequestStartedAt = new Date().getTime();
        xhr.open("GET", url, true);
        try {
          xhr.timeout = 5000;
        } catch (error) {}
        xhr.onreadystatechange = function () {
          var remote;
          var requestStartedAt;
          var responseReceivedAt;
          if (xhr.readyState !== 4) return;
          requestStartedAt = activeRequestStartedAt;
          responseReceivedAt = new Date().getTime();
          finishRequest();
          if (xhr.status < 200 || xhr.status >= 300) {
            scheduleRequest(1000);
            return;
          }
          try {
            remote = JSON.parse(xhr.responseText);
          } catch (error) {
            scheduleRequest(1000);
            return;
          }
          if (remote.legacyRedirect) {
            sessionStorage.setItem("boulderingTimerClientId", clientId);
            sessionStorage.setItem("boulderingTimerForceModern", "1");
            window.location.replace("/");
            return;
          }
          if (manualLegacyUrl && remote.manualLegacy !== true) {
            sessionStorage.setItem("boulderingTimerClientId", clientId);
            sessionStorage.setItem("boulderingTimerForceModern", "1");
            window.location.replace("/");
            return;
          }
          state = remote;
          applyTitle(remote.language || (remote.config && remote.config.language));
          applyTimerFont(remote.config);
          applyTimerColors(remote.config);
          updateServerOffset(remote.now, requestStartedAt || responseReceivedAt, responseReceivedAt);
          lastContact = responseReceivedAt;
          render();
          scheduleRequest(1000);
        };
        xhr.onerror = function () {
          finishRequest();
          scheduleRequest(1000);
        };
        xhr.ontimeout = function () {
          finishRequest();
          scheduleRequest(1000);
        };
        xhr.onabort = function () {
          finishRequest();
          scheduleRequest(1000);
        };
        try {
          xhr.send(null);
        } catch (error) {
          finishRequest();
          scheduleRequest(1000);
        }
      }

      requestState();
      window.setInterval(function () {
        abortStaleRequest();
      }, 3000);
      window.setInterval(render, 250);
      if (window.addEventListener) {
        window.addEventListener("online", function () { scheduleRequest(0); });
        window.addEventListener("pageshow", function () { scheduleRequest(0); scheduleViewportFit(); });
        window.addEventListener("focus", function () { scheduleRequest(0); scheduleViewportFit(); });
      }
    })();
  </script>
</body>
</html>
