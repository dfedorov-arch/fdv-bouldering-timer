    els.instancesSoundToggle.addEventListener("change", () => {
      sendServerAction("instancesSound", {
        enabled: els.instancesSoundToggle.checked
      });
    });

    els.instancesFullscreenToggle.addEventListener("change", () => {
      sendServerAction("instancesFullscreen", {
        enabled: els.instancesFullscreenToggle.checked
      });
    });

    els.festivalAnnouncementsToggle.addEventListener("change", () => {
      if (standaloneMode) {
        state.festivalAnnouncements = els.festivalAnnouncementsToggle.checked;
        rescheduleStandaloneSignals();
        saveOfflineSnapshot();
        return;
      }
      sendServerAction("festivalAnnouncements", {
        enabled: els.festivalAnnouncementsToggle.checked
      }, { rescheduleSignals: true });
    });

    els.soundProfileSelect.addEventListener("change", async () => {
      const previousProfile = state.soundProfile;
      unlockAudio();
      if (standaloneMode) {
        applySoundProfile(els.soundProfileSelect.value);
        await loadAudioBuffers();
        rescheduleStandaloneSignals();
        saveOfflineSnapshot();
        return;
      }
      const changed = await sendServerAction("soundProfile", {
        soundProfile: els.soundProfileSelect.value
      });
      if (!changed) els.soundProfileSelect.value = previousProfile;
    });

    els.soundToggle.addEventListener("change", () => {
      if (standaloneMode) {
        applySoundPreferenceChange();
        saveOfflineSnapshot();
        return;
      }
      if (isPrimaryClient) {
        primarySoundEnabled = els.soundToggle.checked;
        writePrimarySoundPreference(primarySoundEnabled);
        applySoundPreferenceChange();
        return;
      }

      globalSoundEnabled = els.soundToggle.checked;
      applySoundPreferenceChange();
      sendServerAction("sound", {
        enabled: globalSoundEnabled
      });
    });

    [els.climbMinutes, els.breakSeconds].forEach((input) => {
      input.addEventListener("input", () => {
        if (!standaloneMode) {
          sendServerAction("settings", {
            activePreset: state.activePreset,
            settings: draftSettings()
          });
        } else {
          saveOfflineSnapshot();
        }
        if (state.running || state.elapsedBeforePause > 0) {
          return;
        }
        hardReset(false);
      });
    });

    function normalizeStartTimeInput(input, max) {
      const digits = input.value.replace(/\D/g, "").slice(0, 2);
      if (!digits) {
        input.value = "";
        return;
      }
      input.value = String(Math.min(max, Number(digits))).padStart(2, "0");
    }

    [els.startHours, els.startMinutes].forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 2);
        syncButtons();
      });
      input.addEventListener("blur", () => {
        normalizeStartTimeInput(input, input === els.startHours ? 23 : 59);
        if (!standaloneMode) {
          sendServerAction("settings", {
            activePreset: state.activePreset,
            settings: draftSettings()
          });
        } else {
          saveOfflineSnapshot();
        }
      });
    });

    els.scheduledStartBtn.addEventListener("click", toggleScheduledCountdown);
    [els.startBtn, els.compactStart].forEach((button) => button.addEventListener("click", startTimer));
    [els.pauseBtn, els.compactPause].forEach((button) => button.addEventListener("click", pauseTimer));
    [els.resetBtn, els.compactReset].forEach((button) => button.addEventListener("click", () => hardReset(false)));
    els.fullBtn.addEventListener("click", toggleFullscreen);
    els.progressTrack.addEventListener("pointerdown", startScrub);
    els.progressTrack.addEventListener("pointermove", moveScrub);
    els.progressTrack.addEventListener("pointerup", stopScrub);
    els.progressTrack.addEventListener("pointercancel", stopScrub);
    ["pointerdown", "touchstart", "click"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => {
        if (event.target.closest(".action")) return;
        unlockAudio();
        if (pendingViewerFullscreen && isViewerClient && instancesFullscreenEnabled) {
          applyViewerFullscreenPreference(true);
        }
      }, { passive: true });
    });

    document.addEventListener("keydown", async (event) => {
      unlockAudio();
      const key = event.key.toLowerCase();
      const isCtrl = event.ctrlKey || event.metaKey;
      const isPrimaryShortcut = isCtrl && (event.code === "KeyM" || key === "m" || key === "ь");
      if (isPrimaryShortcut) {
        event.preventDefault();
        if (isViewerClient && state.primaryPinSet) {
          const pin = promptPrimaryPin();
          if (pin === null) return;
          const changed = await setPrimaryModeWithOptions(true, { source: "shortcut", pin });
          if (changed === "pin-blocked") window.alert(t("primaryPinBlocked"));
          else if (changed !== true) window.alert(t("primaryPinWrong"));
          return;
        }
        setPrimaryModeWithOptions(!isPrimaryClient, { source: "shortcut" });
        return;
      }
      if (isViewerClient) return;
      const isPauseShortcut = isCtrl && (event.code === "KeyQ" || key === "q" || key === "й");
      const isFullscreenShortcut = isCtrl && (event.code === "KeyF" || key === "f" || key === "а");
      if (isPauseShortcut) {
        event.preventDefault();
        pauseTimer();
        return;
      }
      if (isFullscreenShortcut) {
        event.preventDefault();
        toggleFullscreen();
        return;
      }
      if (key === "z" || key === "я") {
        event.preventDefault();
        if (!state.running) startTimer();
        return;
      }
      if (key === "p" || key === "з") {
        event.preventDefault();
        hardReset(false);
        return;
      }
    });

    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("fullscreen", Boolean(document.fullscreenElement));
      if (isViewerClient && instancesFullscreenEnabled && !document.fullscreenElement) {
        pendingViewerFullscreen = true;
      }
      scheduleFitTimer();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") {
        pageHiddenAt = Date.now();
        markResumeDisplayStale();
        refreshStandaloneBrowserList();
        return;
      }
      if (window.location.protocol === "file:") {
        requestScreenWakeLock();
        refreshStandaloneBrowserList();
        return;
      }
      resumeClientSync({ resetStaleSignals: shouldResetSignalsOnResume() });
    });

    window.addEventListener("pagehide", () => {
      pageHiddenAt = Date.now();
      markResumeDisplayStale();
      saveOfflineSnapshot();
    });

    ["pageshow", "focus", "online"].forEach((eventName) => {
      window.addEventListener(eventName, (event) => {
        if (window.location.protocol === "file:") {
          refreshStandaloneBrowserList();
          return;
        }
        resumeClientSync({ resetStaleSignals: shouldResetSignalsOnResume(event) });
      });
    });

    window.addEventListener("resize", () => {
      syncControlsScrollbarPadding();
      scheduleFitTimer();
    });
    if ("ResizeObserver" in window) {
      const timerResizeObserver = new ResizeObserver(scheduleFitTimer);
      timerResizeObserver.observe(document.querySelector(".stage"));
      timerResizeObserver.observe(document.querySelector(".timer-wrap"));
    }

    const fileMode = window.location.protocol === "file:";
    if (fileMode) initializeFileMode();
    else if (!restoreOfflineReloadSnapshot()) {
      buildTimeline();
      if (offlineReloadMode) setServerAvailable(false);
    }
    syncControlsScrollbarPadding();
    render();
    scheduleFitTimer();
    tick();
    if (renderWatchdogEnabled) window.setInterval(renderWatchdog, 1000);
    if (!fileMode) {
      registerOfflineServiceWorker();
      startSync();
      window.setInterval(saveOfflineSnapshot, 2000);
    }
    window.setInterval(refreshServerAvailability, 500);
    requestScreenWakeLock();
  </script>
</body>
</html>
