  <style>
    :root {
      color-scheme: dark;
      --bg: #0e1116;
      --panel: #171b22;
      --panel-2: #202631;
      --line: #303746;
      --text: #f4f7fb;
      --muted: #a9b2c1;
      --green: #26d07c;
      --red: #f05a59;
      --yellow: #ffc857;
      --cyan: #49c6e5;
      --blue: #6d9cff;
      --shadow: 0 20px 70px rgba(0, 0, 0, .34);
      --timer-font-family: Arial, sans-serif;
      --timer-rotation-text: #f4f7fb;
      --timer-warning-text: #f4f7fb;
      --timer-break-text: #f4f7fb;
      --timer-rotation-bg: #0e1116;
      --timer-warning-bg: #0e1116;
      --timer-break-bg: #f05a59;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--timer-rotation-bg);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: var(--text);
      background: var(--panel-2);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .app {
      min-width: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
    }

    .controls {
      min-width: 0;
      min-height: 100vh;
      display: none;
      flex-direction: column;
      padding: 20px;
      background: rgba(23, 27, 34, .92);
      border-right: 1px solid var(--line);
      overflow: auto;
    }

    body.controls-ready:not(.viewer-mode):not(.fullscreen) .app {
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
    }

    body.controls-ready:not(.viewer-mode):not(.fullscreen) .controls {
      display: flex;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand-copy {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .brand-copy h1 {
      min-width: 0;
      white-space: nowrap;
      font-size: 20px;
    }

    .server-connection-warning {
      display: grid;
      gap: 3px;
      margin: -6px 0 12px;
      padding: 9px 10px;
      border: 1px solid rgba(240, 90, 89, .7);
      border-radius: 7px;
      color: #fff7f7;
      background: rgba(240, 90, 89, .14);
      font-size: 12px;
      line-height: 1.35;
    }

    .server-connection-warning[hidden] {
      display: none;
    }

    .server-connection-warning strong {
      color: var(--red);
      font-size: 13px;
    }

    .server-connection-warning[data-state="standalone"] {
      border-color: rgba(255, 200, 87, .72);
      background: rgba(255, 200, 87, .12);
    }

    .server-connection-warning[data-state="standalone"] strong {
      color: var(--yellow);
    }

    .server-connection-warning[data-state="recovered"] {
      border-color: rgba(79, 209, 139, .7);
      background: rgba(79, 209, 139, .12);
    }

    .server-connection-warning[data-state="recovered"] strong {
      color: var(--green);
    }

    .server-connection-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .server-connection-action {
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 5px;
      color: #f7f9fc;
      background: rgba(255, 255, 255, .08);
      font: inherit;
      cursor: pointer;
    }

    .server-connection-action:hover {
      border-color: rgba(255, 255, 255, .52);
      background: rgba(255, 255, 255, .14);
    }

    .language-toggle {
      flex: 0 0 auto;
      min-width: 42px;
      min-height: 30px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .brand-mark {
      width: 38px;
      height: 42px;
      display: grid;
      place-items: center;
      color: var(--text);
    }

    .brand-mark svg {
      width: 36px;
      height: 36px;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      padding: 13px 0;
      border-top: 1px solid var(--line);
    }

    .section.no-divider {
      border-top: 0;
      padding-top: 0;
    }

    .section-title {
      margin: 0 0 9px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .control-footer {
      margin-top: auto;
      padding-top: 12px;
    }

    .help-link {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--muted);
      background: rgba(255, 255, 255, .03);
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
    }

    .help-link:hover,
    .help-link:focus-visible {
      border-color: var(--cyan);
      color: var(--text);
      outline: none;
    }

    .credits {
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
      opacity: .82;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .start-time-fields {
      width: 100%;
      margin-top: 9px;
      margin-bottom: 10px;
    }

    .start-time-fields > div {
      width: 100%;
      min-width: 0;
    }

    .start-time-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 28px;
      margin-bottom: 6px;
    }

    .start-time-title {
      color: var(--muted);
      font-size: 13px;
    }

    .start-time-action {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--green);
      background: transparent;
      font-size: 14px;
      line-height: 1;
      transition: background .16s ease, border-color .16s ease;
    }

    .start-time-action:not(:disabled):hover {
      background: rgba(87, 211, 140, .12);
      border-color: var(--green);
    }

    .start-time-action.stop-mode {
      color: var(--red);
    }

    .start-time-action.stop-mode:not(:disabled):hover {
      background: rgba(240, 90, 89, .12);
      border-color: var(--red);
    }

    .start-time-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: center;
      gap: 10px;
    }

    .start-time-unit {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .start-time-unit input {
      width: 100%;
      min-width: 0;
      text-align: center;
    }

    .start-time-unit > span,
    .parameter-input-row > span {
      width: 52px;
    }

    .parameter-field {
      min-width: 0;
    }

    .parameter-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .parameter-input-row input {
      min-width: 0;
      text-align: center;
    }

    .preset {
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--muted);
      transition: .16s ease;
    }

    .preset.active {
      color: #101318;
      background: var(--yellow);
      border-color: var(--yellow);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .sound-profile-field {
      margin-top: 9px;
    }

    .festival-announcements-row {
      margin-top: 0;
    }

    .festival-announcements-row[hidden] {
      display: none;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select {
      width: 100%;
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #10141b;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(73, 198, 229, .14);
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 32px;
      font-size: 13px;
    }

    .switch-row input {
      width: 35px;
      height: 20px;
      min-height: 20px;
      padding: 0;
      margin: 0;
      accent-color: var(--cyan);
    }

    .primary-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .primary-pin-button {
      width: 35px;
      height: 20px;
      min-height: 20px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid var(--yellow);
      background: #10141b;
      color: var(--muted);
      font-size: 10px;
      line-height: 18px;
      cursor: pointer;
    }

    .primary-pin-button.is-set {
      border-color: var(--green);
      color: var(--text);
    }

    .primary-pin-button:disabled {
      opacity: .5;
      cursor: default;
    }

    .primary-pin-panel {
      display: grid;
      grid-template-columns: 70px auto auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .primary-pin-panel[hidden] {
      display: none;
    }

    .primary-pin-panel input {
      height: 32px;
      text-align: center;
      letter-spacing: 0;
    }

    .primary-pin-panel button {
      min-height: 32px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #151b24;
      color: var(--text);
      padding: 0 10px;
      cursor: pointer;
    }

    .primary-pin-panel span {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .primary-option {
      display: none;
    }

    body.primary-active .primary-option {
      display: flex;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .action {
      min-height: 46px;
      border-radius: 8px;
      font-weight: 850;
      border: 1px solid transparent;
    }

    .start { background: var(--green); color: #07130d; }
    .pause { background: var(--yellow); color: #1a1402; }
    .reset { background: transparent; border-color: var(--line); color: var(--muted); }
    .full { background: var(--blue); color: #071225; }

    .connections {
      margin-top: 13px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .connections-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .browser-list {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .browser-item {
      min-width: 0;
      display: grid;
      gap: 2px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 20, 27, .72);
      font-size: 12px;
      color: var(--muted);
    }

    .browser-item strong {
      color: var(--text);
      font-size: 13px;
    }

    .browser-address-copy {
      display: inline;
      padding: 0;
      border: 0;
      border-radius: 0;
      color: var(--cyan);
      background: transparent;
      font: inherit;
      font-weight: inherit;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 2px;
    }

    .browser-address-copy:hover,
    .browser-address-copy:focus-visible {
      color: var(--green);
      outline: none;
    }

    .browser-copy-feedback {
      margin-left: 5px;
      color: var(--green);
      font-size: 10px;
      font-weight: 750;
    }

    .browser-item.offline {
      opacity: .55;
    }

    .diag-row {
      min-width: 0;
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      margin-top: 2px;
    }

    .diag-chip {
      flex: 0 0 auto;
      padding: 2px 5px;
      border-radius: 999px;
      font-size: 10px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: .02em;
      white-space: nowrap;
      color: #07130d;
      background: var(--green);
    }

    .diag-chip.bad {
      color: #fff7f7;
      background: var(--red);
    }

    .diag-chip.warn {
      color: #1a1402;
      background: var(--yellow);
    }

    .diag-chip.neutral {
      color: var(--text);
      background: #2d3542;
    }

    .diag-chip.manual-legacy {
      color: #07130d;
      background: var(--green);
      box-shadow: 0 0 0 2px #ff9f43;
    }

    .diag-chip.clickable {
      cursor: pointer;
    }

    .diag-chip.clickable:hover {
      outline: 2px solid rgba(255, 255, 255, .35);
      outline-offset: 1px;
    }

    .diag-chip.calibrated {
      box-shadow: 0 0 0 2px #ff9f43;
    }

    .diag-chip.editing {
      color: #1a0d00;
      background: #ff9f43;
      box-shadow: 0 0 0 2px #ff9f43;
    }

    .audio-offset-editor {
      grid-column: 1 / -1;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .audio-offset-value {
      margin-bottom: 5px;
      color: #ffb76b;
      font-size: 11px;
      font-weight: 850;
      text-align: center;
    }

    .audio-offset-editor input[type="range"] {
      width: 100%;
      min-height: 20px;
      padding: 0;
      accent-color: #ff9f43;
      cursor: ew-resize;
    }

    .audio-offset-scale {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      margin-top: 2px;
      color: var(--muted);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
    }

    .audio-offset-scale button {
      min-width: 0;
      min-height: 20px;
      padding: 0;
      border: 0;
      border-radius: 3px;
      color: inherit;
      background: transparent;
      font: inherit;
      text-align: center;
      cursor: pointer;
    }

    .audio-offset-scale button:hover,
    .audio-offset-scale button:focus-visible {
      color: #ffb76b;
      background: rgba(255, 159, 67, .12);
      outline: none;
    }

    .audio-offset-scale button:first-child {
      text-align: left;
    }

    .audio-offset-scale button:last-child {
      text-align: right;
    }

    .audio-test-controls {
      display: grid;
      gap: 7px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid var(--line);
    }

    .audio-test-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
    }

    .audio-test-buttons button {
      min-width: 0;
      min-height: 27px;
      padding: 4px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      background: #17191d;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .audio-test-buttons button:not(:disabled):hover,
    .audio-test-buttons button:not(:disabled):focus-visible {
      border-color: #ff9f43;
      color: #ffb76b;
      outline: none;
    }

    .audio-test-buttons button:disabled {
      cursor: not-allowed;
    }

    .audio-test-everywhere {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
      cursor: pointer;
    }

    .audio-test-everywhere input {
      width: 13px;
      height: 13px;
      margin: 0;
      accent-color: #ff9f43;
    }

    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(18px, 3vw, 42px);
      position: relative;
      overflow: hidden;
      background: var(--timer-rotation-bg);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      min-height: 56px;
    }

    .topbar,
    .phase,
    .meta {
      display: none;
    }

    .competition {
      min-width: 0;
    }

    .competition input {
      max-width: 520px;
      height: 52px;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 850;
      background: transparent;
      border-color: transparent;
      padding-left: 0;
    }

    .competition input:focus {
      border-color: var(--line);
      padding-left: 12px;
    }

    .status-pill {
      flex: 0 0 auto;
      min-width: 116px;
      min-height: 42px;
      display: grid;
      place-items: center;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 12px;
    }

    .timer-wrap {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 0;
      text-align: center;
      min-height: 0;
      height: 100%;
      pointer-events: none;
    }

    footer {
      position: relative;
      z-index: 2;
    }

    .phase {
      display: inline-grid;
      min-width: min(86vw, 520px);
      min-height: 78px;
      place-items: center;
      border-radius: 8px;
      font-size: clamp(28px, 5vw, 74px);
      line-height: 1;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0;
      box-shadow: var(--shadow);
    }

    .phase.rotation { background: #101318; color: var(--text); border: 1px solid var(--line); }
    .phase.break { background: var(--red); color: #190505; }
    .phase.climb { background: #101318; color: var(--text); border: 1px solid var(--line); }
    .phase.rest { background: var(--red); color: #190505; }
    .phase.ready { background: var(--cyan); color: #041217; }
    .phase.done { background: var(--yellow); color: #171100; }

    .time {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      max-width: 100%;
      font-variant-numeric: tabular-nums;
      font-size: var(--timer-font-size, clamp(120px, min(31vw, 58vh), 900px));
      line-height: .86;
      font-weight: 950;
      letter-spacing: 0;
      font-family: var(--timer-font-family);
      color: var(--timer-rotation-text);
      text-shadow: 0 22px 55px rgba(0, 0, 0, .38);
    }

    .time-part {
      min-width: 2ch;
      text-align: right;
    }

    #timeSeconds {
      text-align: left;
    }

    .time-separator {
      width: .45ch;
      text-align: center;
      transform: translateY(-.04em);
    }

    body.resume-sync-pending .phase,
    body.resume-sync-pending .time,
    body.resume-sync-pending .meta,
    body.resume-sync-pending .progress,
    body.resume-sync-pending .schedule {
      opacity: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
    }

    .meta-item {
      min-width: 132px;
      min-height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 27, 34, .68);
      font-size: clamp(14px, 1.6vw, 20px);
      font-weight: 760;
    }

    .progress {
      height: 14px;
      border-radius: 999px;
      background: #10141b;
      border: 1px solid var(--line);
      overflow: hidden;
      cursor: default;
      touch-action: none;
    }

    body.scrub-ready .progress {
      cursor: ew-resize;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--green), var(--yellow));
      transition: width .18s linear;
    }

    .schedule {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 8px;
      margin-top: 18px;
    }

    .chip {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(23, 27, 34, .5);
      font-size: 13px;
      font-weight: 780;
    }

    .chip-cycle {
      color: var(--text);
      padding-left: 8px;
      border-left: 1px solid rgba(255, 255, 255, .22);
    }

    .phase,
    .meta {
      display: none;
    }

    .chip.current {
      color: #07130d;
      background: var(--green);
      border-color: var(--green);
    }

    .chip.resting.current {
      color: #190505;
      background: var(--red);
      border-color: var(--red);
    }

    body.warning-active,
    body.warning-active .stage {
      background: var(--timer-warning-bg);
    }

    body.warning-active .time {
      color: var(--timer-warning-text);
    }

    body.break-active {
      background: var(--timer-break-bg);
    }

    body.break-active .stage {
      background: var(--timer-break-bg);
    }

    body.break-active .time {
      color: var(--timer-break-text);
    }

    body.break-active .controls {
      background: rgba(68, 12, 14, .94);
      background: color-mix(in srgb, var(--timer-break-bg) 35%, #10141b);
      border-right-color: rgba(255, 255, 255, .2);
    }

    .compact-actions {
      display: none;
      gap: 8px;
      justify-content: center;
    }

    .compact-actions .action {
      min-width: 86px;
      min-height: 46px;
    }

    body.flash .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .18);
      pointer-events: none;
      animation: flash .6s ease both;
    }

    @keyframes flash {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @media (min-width: 901px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .app {
        height: 100vh;
        height: 100dvh;
        min-height: 0;
      }

      .controls {
        height: 100%;
        min-height: 0;
        padding-right: var(--controls-padding-right, 20px);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
      }

      .stage {
        height: 100%;
        min-height: 0;
      }
    }

    @media (max-width: 900px) {
      html,

        overflow-x: hidden;
      }

      body.controls-ready:not(.viewer-mode):not(.fullscreen) .app {

      }

      .stage {

      }
    }

    @media (max-width: 560px) {

        align-items: flex-start;

      }

      .diag-row {
        flex-wrap: wrap;
      }

      .compact-actions {

      }

      const elapsed = elapsedSeconds();

      if (!segment) return;
      const remaining = segment.end - elapsed;
      const duration = segment.end - segment.start;
      lastSegmentIndex = `${segment.cycle}:${segment.type}`;
      scheduleSegmentSignals(segment, remaining, duration, false);
      if (isBeforeScheduledStart() && !state.activeSettings.oneShot) {
        scheduleBufferedSignalAt(segment, state.serverStartedAt, "start", true);
      }

    function restoreOfflineReloadSnapshot() {
      if (!offlineReloadMode || window.location.protocol === "file:" || !window.localStorage) return false;
      try {
        const snapshot = JSON.parse(localStorage.getItem(offlineSnapshotKey) || "null");
        if (!snapshot || snapshot.schemaVersion !== 1 || !snapshot.state) return false;
        const savedAtWall = Number(snapshot.savedAtWall);
        const age = Date.now() - savedAtWall;
        if (!Number.isFinite(savedAtWall) || age < 0 || age > offlineSnapshotMaxAgeMs) return false;

        if (snapshot.config && typeof snapshot.config === "object") applyStartupConfig(snapshot.config);
        if (snapshot.language) applyLanguage(snapshot.language);
        standaloneMode = Boolean(snapshot.standaloneMode);
        pendingServerState = null;
        if (standaloneMode) offlineReloadMode = false;
        primarySoundEnabled = snapshot.primarySoundEnabled !== false;
        globalSoundEnabled = snapshot.globalSoundEnabled !== false;
        instancesSoundEnabled = Boolean(snapshot.instancesSoundEnabled);
        instancesFullscreenEnabled = Boolean(snapshot.instancesFullscreenEnabled);
        audioUserOffsetMs = Number(snapshot.audioUserOffsetMs || 0);

        Object.assign(state, {
          running: Boolean(snapshot.state.running),
          completed: Boolean(snapshot.state.completed),
          countdownOnly: Boolean(snapshot.state.countdownOnly),
          waitingForManualStart: Boolean(snapshot.state.waitingForManualStart),
          serverStartedAt: Number(snapshot.state.serverStartedAt || 0),
          elapsedBeforePause: Number(snapshot.state.elapsedBeforePause || 0),
          activePreset: snapshot.state.activePreset || "",

          festivalAnnouncements: snapshot.state.festivalAnnouncements !== false,
          primaryClientId: snapshot.state.primaryClientId || null,
          primaryPinSet: Boolean(snapshot.state.primaryPinSet)
        });
        if (snapshot.draftSettings) setInputsFromDraft(snapshot.draftSettings);
        applySoundProfile(String(snapshot.state.soundProfile || ""));
        buildTimeline(state.activeSettings);

        const restoredRate = clampFloat(snapshot.serverClockRate, syncRateLargeMin, syncRateLargeMax, 1);
        const savedServerNow = Number(snapshot.serverNow);
        const restoredServerNow = (Number.isFinite(savedServerNow) ? savedServerNow : savedAtWall)
          + (age * restoredRate);
        const localNow = performance.now();
        serverClockRate = restoredRate;
        serverClockRateConfidence = "offline-reload";
        serverClockRateGateReason = "offline-reload";
        serverPerfAnchor = localNow;
        serverTimeAnchor = restoredServerNow;
        serverPerfOffset = restoredServerNow - localNow;
        syncQuality = {
          ...syncQuality,
          rate: serverClockRate,
          rateConfidence: serverClockRateConfidence,
          rateGateReason: serverClockRateGateReason,
          rateAcceptedPpm: Math.round((serverClockRate - 1) * 1000000)

        setServerAvailable(false);
        if (standaloneMode) {
          rescheduleStandaloneSignals();
          revealControlsIfAllowed();
          refreshStandaloneBrowserList();
        }
        return true;
      } catch (error) {
        return false;
      }
    }

    function fitTimerText() {
      timerFitQueued = false;
      const wrap = els.time.closest(".timer-wrap");
      if (!wrap) return;

      const rect = wrap.getBoundingClientRect();
      if (rect.width < 1 || rect.height < 1) return;

      const isLargeScreenMode = document.fullscreenElement || document.body.classList.contains("viewer-mode");
      const maxWidth = Math.max(60, rect.width * (isLargeScreenMode ? 0.99 : 0.985));
      const maxHeight = Math.max(60, rect.height * (isLargeScreenMode ? 0.98 : 0.96));
      let low = 48;
      let high = Math.min(1800, Math.max(220, rect.width, rect.height * 1.45));

      for (let i = 0; i < 13; i += 1) {
        const mid = (low + high) / 2;
        els.time.style.setProperty("--timer-font-size", `${mid}px`);
        const timeRect = els.time.getBoundingClientRect();
        if (timeRect.width <= maxWidth && timeRect.height <= maxHeight) {
          low = mid;
        } else {
          high = mid;
        }
      }

      els.time.style.setProperty("--timer-font-size", `${Math.floor(low)}px`);
    }

    async function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;
      try {
        audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") await audioContext.resume();
        const gain = audioContext.createGain();
        const osc = audioContext.createOscillator();
        gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
        osc.connect(gain).connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + 0.03);
        await loadAudioBuffers();
      } catch (error) {}
      refreshStandaloneBrowserList();
    }

    async function loadAudioBuffers() {
      if (buffersLoading || !audioContext) return buffersLoading;
      const generation = audioLoadGeneration;
      const decodedBySource = new Map();
      buffersLoading = Promise.all(audioKinds.map(async (kind) => {
        const source = audioSources[kind];
        if (!source) {
          if (generation === audioLoadGeneration) audioBuffers[kind] = null;
          return;
        }
        try {
          if (!decodedBySource.has(source)) {
            decodedBySource.set(source, fetch(source)
              .then((response) => response.ok ? response.arrayBuffer() : Promise.reject(new Error("Audio file not found")))
              .then((buffer) => audioContext.decodeAudioData(buffer)));
          }
          const decoded = await decodedBySource.get(source);
          if (generation === audioLoadGeneration) audioBuffers[kind] = decoded;
        } catch (error) {
          if (generation === audioLoadGeneration) audioBuffers[kind] = null;
        }
      })).catch(() => {});
      return buffersLoading;
    }

    function serverNow() {
      const localNow = performance.now();
      return serverTimeAnchor + ((localNow - serverPerfAnchor) * serverClockRate);
    }

    function applyServerClockModel(nextServerNow, nextRate, direct = false) {
      const localNow = performance.now();
      const currentServerNow = serverNow();
      const correction = nextServerNow - currentServerNow;
      const maxCorrection = direct ? Infinity : 250;
      const adjustedServerNow = currentServerNow + clampFloat(correction, -maxCorrection, maxCorrection, 0);
      serverClockRate = clampFloat(nextRate, syncRateLargeMin, syncRateLargeMax, 1);
      serverPerfAnchor = localNow;
      serverTimeAnchor = adjustedServerNow;
      serverPerfOffset = adjustedServerNow - localNow;
    }

    function reanchorServerClockModel(confidence = "held") {
      const heldServerNow = serverNow();
      const localNow = performance.now();
      serverClockRateConfidence = confidence;
      serverClockRateGateReason = confidence;
      serverPerfAnchor = localNow;
      serverTimeAnchor = heldServerNow;
      serverPerfOffset = heldServerNow - localNow;
      syncQuality = {
        ...syncQuality,
        rate: serverClockRate,
        rateConfidence: serverClockRateConfidence,
        rateGateReason: serverClockRateGateReason,
        rateAcceptedPpm: Math.round((serverClockRate - 1) * 1000000)
      };
    }

    function holdServerClockRateForOffline() {
      reanchorServerClockModel("offline-held");
    }

    function resetServerClockModel() {
      const localNow = performance.now();
      const dateNow = Date.now();
      syncSamples = [];
      serverClockRate = 1;
      serverClockRateHighConfidence = false;
      serverClockRateConfidence = "reset";
      serverPerfAnchor = localNow;
      serverTimeAnchor = dateNow;
      serverPerfOffset = dateNow - localNow;
      syncQuality = { latency: null, offset: null, error: null, jitter: null, samples: 0, rate: 1 };
    }

    function updateServerTiming(remote, timing = {}, options = {}) {
      const remoteVersion = Number(remote?.version || 0);
      if (Number.isFinite(remoteVersion) && remoteVersion > lastServerVersion) {
        lastServerVersion = remoteVersion;
      }
      const date0 = Number(timing.date0 ?? timing.t0);
      const date1 = Number(timing.date1 ?? timing.t1);
      const perf0 = Number(timing.perf0 ?? timing.t0);
      const perf1 = Number(timing.perf1 ?? timing.t1);
      const remoteNow = Number(remote.now);
      const preserveClockRate = Boolean(options.preserveClockRate);
      const holdExistingClockRate = preserveClockRate
        || serverClockRateConfidence === "resume-held"
        || serverClockRateGateReason === "resume-held";
      if (Number.isFinite(remoteNow)) {
        const modelDriftMs = Math.abs(remoteNow - serverNow());
        if (modelDriftMs > 1000) {
          options = {
            ...options,
            forceClockCorrection: true
          };
        }
      }
      if (options.resetClockSamples) syncSamples = [];
      const rawServerReceivedAt = remote.serverReceivedAt;
      const rawServerSentAt = remote.serverSentAt;
      const serverReceivedAt = rawServerReceivedAt === null || rawServerReceivedAt === undefined || rawServerReceivedAt === "" ? NaN : Number(rawServerReceivedAt);
      const serverSentAt = rawServerSentAt === null || rawServerSentAt === undefined || rawServerSentAt === "" ? NaN : Number(rawServerSentAt);
      if (Number.isFinite(date0) && Number.isFinite(date1)
        && Number.isFinite(perf0) && Number.isFinite(perf1)
        && Number.isFinite(remoteNow)) {
        const latency = Math.max(0, perf1 - perf0);
        const hasServerTiming = Number.isFinite(serverReceivedAt) && Number.isFinite(serverSentAt);
        const serverMid = hasServerTiming ? (serverReceivedAt + serverSentAt) / 2 : remoteNow;
        const perfMid = (perf0 + perf1) / 2;
        const dateMid = (date0 + date1) / 2;
        const processingDelay = hasServerTiming ? Math.max(0, serverSentAt - serverReceivedAt) : 0;
        const networkLatency = Math.max(0, latency - processingDelay);
        const sample = {
          at: performance.now(),
          latency,
          networkLatency,
          perfTime: perfMid,
          serverTime: serverMid,
          clockOffset: serverMid - dateMid,
          perfOffset: serverMid - perfMid
        };
        syncSamples.push(sample);
        syncSamples = syncSamples
          .filter((item) => sample.at - item.at < syncSampleWindowMs)
          .slice(-syncMaxSamples);

        const bestSamples = [...syncSamples]
          .sort((a, b) => (a.networkLatency ?? a.latency) - (b.networkLatency ?? b.latency))
          .slice(0, Math.min(5, syncSamples.length));
        const clockOffsets = bestSamples.map((item) => item.clockOffset).sort((a, b) => a - b);
        const perfOffsets = bestSamples.map((item) => item.perfOffset).sort((a, b) => a - b);
        const latencies = bestSamples.map((item) => item.networkLatency ?? item.latency).sort((a, b) => a - b);
        const bestLatency = latencies[0] ?? latency;
        const localNow = performance.now();
        let nextServerNow = localNow + median(perfOffsets);
        let nextRate = serverClockRate;
        let jitter = clockOffsets.length > 1
          ? Math.max(...clockOffsets) - Math.min(...clockOffsets)
          : 0;
        let qualitySamples = bestSamples.length;

        const minLatency = Math.min(...syncSamples.map((item) => item.networkLatency ?? item.latency));
        const maxModelLatency = Math.max(120, minLatency + 60, minLatency * 1.8);
        const modelSamples = syncSamples
          .filter((item) => (item.networkLatency ?? item.latency) <= maxModelLatency)
          .sort((a, b) => a.perfTime - b.perfTime);
        const firstModelSample = modelSamples[0];
        const lastModelSample = modelSamples[modelSamples.length - 1];
        const modelSpan = firstModelSample && lastModelSample
          ? lastModelSample.perfTime - firstModelSample.perfTime
          : 0;

        let candidateRate = 1;
        let candidateRatePpm = 0;
        let acceptedRatePpm = Math.round((serverClockRate - 1) * 1000000);
        let residualJitter = jitter;
        let residualMinMax = jitter;
        let rateHalfDiffPpm = 0;
        let rateOutlierShare = 0;
        serverClockRateGateReason = "insufficient-window";

        if (modelSamples.length >= 4 && modelSpan >= syncRateMinSpanMs) {
          const fit = fitClockRate(modelSamples);
          let fittedRate = fit?.rate ?? 1;
          candidateRate = fittedRate;
          candidateRatePpm = Math.round((candidateRate - 1) * 1000000);
          residualJitter = fit?.residualJitter ?? jitter;
          residualMinMax = fit?.residualMinMax ?? residualJitter;
          rateOutlierShare = fit?.outlierShare ?? 0;
          const fittedRatePpm = Math.abs(candidateRatePpm);
          const largeRateCandidate = fittedRatePpm > syncRateLargeThresholdPpm;
          let stableHalfRates = true;
          if (largeRateCandidate) {
            const middleTime = firstModelSample.perfTime + (modelSpan / 2);
            const firstHalf = modelSamples.filter((item) => item.perfTime <= middleTime);
            const secondHalf = modelSamples.filter((item) => item.perfTime > middleTime);
            const firstHalfFit = firstHalf.length >= 4 ? fitClockRate(firstHalf) : null;
            const secondHalfFit = secondHalf.length >= 4 ? fitClockRate(secondHalf) : null;
            if (firstHalfFit && secondHalfFit) {
              rateHalfDiffPpm = Math.abs(Math.round((firstHalfFit.rate - secondHalfFit.rate) * 1000000));
              stableHalfRates = rateHalfDiffPpm <= syncRateLargeMaxHalfDiffPpm;
            } else {
              stableHalfRates = false;
              rateHalfDiffPpm = NaN;
            }
          }
          const highConfidenceLargeRate = largeRateCandidate
            && modelSpan >= syncRateLargeMinSpanMs
            && modelSamples.length >= syncRateLargeMinSamples
            && residualJitter <= syncRateLargeMaxResidualMs
            && stableHalfRates
            && rateOutlierShare <= syncRateLargeMaxOutlierShare;
          if (largeRateCandidate && !highConfidenceLargeRate) {
            if (modelSpan < syncRateLargeMinSpanMs) serverClockRateGateReason = "short-window";
            else if (modelSamples.length < syncRateLargeMinSamples) serverClockRateGateReason = "few-samples";
            else if (residualJitter > syncRateLargeMaxResidualMs) serverClockRateGateReason = "unstable-residuals";
            else if (!stableHalfRates) serverClockRateGateReason = "unstable-rate";
            else if (rateOutlierShare > syncRateLargeMaxOutlierShare) serverClockRateGateReason = "outliers";
            else serverClockRateGateReason = "gated";
            if (holdExistingClockRate) {
              fittedRate = serverClockRate;
              serverClockRateConfidence = serverClockRateConfidence || "resume-held";
            } else {
              fittedRate = 1;
              serverClockRateHighConfidence = false;
              serverClockRateConfidence = "gated";
            }
          } else {
            fittedRate = largeRateCandidate
              ? fittedRate
              : clampFloat(fittedRate, syncRateNormalMin, syncRateNormalMax, 1);
            serverClockRateHighConfidence = highConfidenceLargeRate;
            serverClockRateConfidence = highConfidenceLargeRate ? "high" : "normal";
            serverClockRateGateReason = largeRateCandidate ? "accepted-large" : "normal";
          }
          if (Math.abs(fittedRate - 1) < syncRateDeadband) fittedRate = 1;
          const smoothing = syncSamples.length < 8 ? 0.45 : syncRateSmoothing;
          nextRate = serverClockRate + ((fittedRate - serverClockRate) * smoothing);
          acceptedRatePpm = Math.round((nextRate - 1) * 1000000);
          const modelOffsets = modelSamples
            .map((item) => item.serverTime - (nextRate * item.perfTime))
            .sort((a, b) => a - b);
          const modelOffset = median(modelOffsets);
          nextServerNow = modelOffset + (nextRate * localNow);
          const residuals = modelSamples
            .map((item) => item.serverTime - (modelOffset + (nextRate * item.perfTime)))
            .sort((a, b) => a - b);
          jitter = residuals.length > 1
            ? percentile(residuals, 0.9) - percentile(residuals, 0.1)
            : 0;
          qualitySamples = modelSamples.length;
        }

        serverTimeOffset = median(clockOffsets);
        applyServerClockModel(nextServerNow, nextRate, options.forceClockCorrection || syncSamples.length < 3);
        syncQuality = {
          latency,
          offset: serverTimeOffset,
          error: (bestLatency / 2) + jitter,
          jitter,
          samples: qualitySamples,
          rate: serverClockRate,
          rateConfidence: serverClockRateConfidence,
          rateGateReason: serverClockRateGateReason,
          rateCandidatePpm: candidateRatePpm,
          rateAcceptedPpm: acceptedRatePpm,
          rateResidualJitter: residualJitter,
          rateResidualMinMax: residualMinMax,
          rateHalfDiffPpm,
          rateOutlierShare
        };
        return;
      }
      if (Number.isFinite(remoteNow) && (syncSamples.length === 0 || options.forceClockCorrection)) {
        serverTimeOffset = remoteNow - Date.now();
        applyServerClockModel(remoteNow, serverClockRate, true);
        syncQuality = {
          ...syncQuality,
          offset: serverTimeOffset,
          rate: serverClockRate,
          rateConfidence: serverClockRateConfidence
        };
      }
    }

    function median(values) {
      if (!values.length) return 0;
      const middle = Math.floor(values.length / 2);
      if (values.length % 2) return values[middle];
      return (values[middle - 1] + values[middle]) / 2;
    }

    function percentile(sortedValues, ratio) {
      if (!sortedValues.length) return 0;
      const index = Math.min(sortedValues.length - 1, Math.max(0, Math.round((sortedValues.length - 1) * ratio)));
      return sortedValues[index];
    }

    function fitClockRate(samples) {
      if (!samples.length) return null;
      const meanPerf = samples.reduce((sum, item) => sum + item.perfTime, 0) / samples.length;
      const meanServer = samples.reduce((sum, item) => sum + item.serverTime, 0) / samples.length;
      const denominator = samples.reduce((sum, item) => {
        const diff = item.perfTime - meanPerf;
        return sum + (diff * diff);
      }, 0);
      if (denominator <= 0) return null;
      const numerator = samples.reduce((sum, item) => {
        return sum + ((item.perfTime - meanPerf) * (item.serverTime - meanServer));
      }, 0);
      let rate = numerator / denominator;
      rate = clampFloat(rate, syncRateLargeMin, syncRateLargeMax, 1);
      const offsets = samples
        .map((item) => item.serverTime - (rate * item.perfTime))
        .sort((a, b) => a - b);
      const offset = median(offsets);
      const residuals = samples
        .map((item) => item.serverTime - (offset + (rate * item.perfTime)))
        .sort((a, b) => a - b);
      const residualJitter = residuals.length > 1
        ? percentile(residuals, 0.9) - percentile(residuals, 0.1)
        : 0;
      const outlierLimit = Math.max(syncRateLargeMaxResidualMs * 2, residualJitter * 3, 250);
      const outliers = residuals.filter((value) => Math.abs(value) > outlierLimit).length;
      return {
        rate,
        offset,
        residualJitter,
        residualMinMax: residuals.length > 1 ? residuals[residuals.length - 1] - residuals[0] : 0,
        outlierShare: samples.length ? outliers / samples.length : 0
      };
    }

    function clampFloat(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function clientDiagnostics() {
      const audioBaseLatency = Number(audioContext?.baseLatency);
      const audioOutputLatency = Number(audioContext?.outputLatency);
      const finiteOrBlank = (value) => Number.isFinite(Number(value)) ? value : "";
      return {
        clientId,
        legacy: false,
        latency: syncQuality.latency ?? "",
        offset: syncQuality.offset ?? "",
        syncError: syncQuality.error ?? "",
        syncJitter: syncQuality.jitter ?? "",
        syncSamples: syncQuality.samples ?? "",
        syncRate: syncQuality.rate ?? "",
        syncRateConfidence: syncQuality.rateConfidence ?? serverClockRateConfidence,
        syncRateGateReason: syncQuality.rateGateReason ?? serverClockRateGateReason,
        syncRateCandidatePpm: finiteOrBlank(syncQuality.rateCandidatePpm),
        syncRateAcceptedPpm: finiteOrBlank(syncQuality.rateAcceptedPpm),
        syncRateResidualJitter: finiteOrBlank(syncQuality.rateResidualJitter),
        syncRateResidualMinMax: finiteOrBlank(syncQuality.rateResidualMinMax),
        syncRateHalfDiffPpm: finiteOrBlank(syncQuality.rateHalfDiffPpm),
        syncRateOutlierShare: finiteOrBlank(syncQuality.rateOutlierShare),
        visibility: document.visibilityState,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        screen: `${window.screen.width}x${window.screen.height}`,
        dpr: window.devicePixelRatio || 1,
        audioUnlocked,
        soundAllowed: canPlaySound(),
        audioBaseLatency: Number.isFinite(audioBaseLatency) ? audioBaseLatency * 1000 : "",
        audioOutputLatency: Number.isFinite(audioOutputLatency) ? audioOutputLatency * 1000 : "",
        wakeLockSupported: Boolean(navigator.wakeLock?.request),
        wakeLockActive: Boolean(screenWakeLock),
        eventSourceSupported: Boolean(window.EventSource),
        eventSourceConnected,
        lastSseAge: Math.max(0, performance.now() - lastSseEventAt),
        sseRestarts,
        stateVersion: lastServerVersion || "",
        displayStatus: els.status?.textContent || ""
      };
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, Math.round(number)));
    }

    function finiteNumber(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function applyTimerAppearance(config) {
      const rootStyle = document.documentElement.style;
      const setSupported = (variable, property, value) => {
        const candidate = String(value || "").trim();
        if (candidate && CSS.supports(property, candidate)) {
          rootStyle.setProperty(variable, candidate);
        }
      };
      const fallbackFont = String(config.timerFont || "Arial, sans-serif").trim();
      const fontUrl = String(config.timerFontUrl || "").trim();
      let fontFaceStyle = document.getElementById("timerFontFace");
      if (fontUrl) {
        if (!fontFaceStyle) {
          fontFaceStyle = document.createElement("style");
          fontFaceStyle.id = "timerFontFace";
          document.head.appendChild(fontFaceStyle);
        }
        if (fontFaceStyle.dataset.fontUrl !== fontUrl) {
          const extension = fontUrl.split(".").pop().toLowerCase();
          const format = { woff2: "woff2", woff: "woff", ttf: "truetype", otf: "opentype" }[extension] || "truetype";
          fontFaceStyle.textContent = `@font-face { font-family: "Bouldering Timer Font"; src: url(${JSON.stringify(fontUrl)}) format("${format}"); font-style: normal; font-weight: 100 1000; font-display: swap; }`;
          fontFaceStyle.dataset.fontUrl = fontUrl;
        }
        setSupported("--timer-font-family", "font-family", `"Bouldering Timer Font", ${fallbackFont}`);
      } else {
        fontFaceStyle?.remove();
        setSupported("--timer-font-family", "font-family", fallbackFont);
      }
      setSupported("--timer-rotation-text", "color", config.rotationTextColor);
      setSupported("--timer-warning-text", "color", config.rotationLastFiveTextColor);
      setSupported("--timer-break-text", "color", config.breakTextColor);
      setSupported("--timer-rotation-bg", "background-color", config.rotationBackgroundColor);
      setSupported("--timer-warning-bg", "background-color", config.rotationLastFiveBackgroundColor);
      setSupported("--timer-break-bg", "background-color", config.breakBackgroundColor);
    }

    function maybeReloadForNewerServerBuild(nextBuildNumber) {
      if (!Number.isFinite(nextBuildNumber) || nextBuildNumber <= pageBuildNumber) return false;
      if (window.location.protocol === "file:" || standaloneMode || offlineReloadMode || state.running) return false;
      const url = new URL(window.location.href);
      url.searchParams.set("build", String(Math.round(nextBuildNumber)));
      url.searchParams.set("reload", String(Date.now()));
      window.location.replace(url.toString());
      return true;
    }

    function applyStartupConfig(config) {
      if (!config || typeof config !== "object") return;
      lastStartupConfig = { ...config };
      applyTimerAppearance(config);
      const nextBuildNumber = Number(config.buildNumber);
      if (maybeReloadForNewerServerBuild(nextBuildNumber)) return;
      buildNumber = Number.isFinite(nextBuildNumber) ? String(Math.round(nextBuildNumber)) : "";
      renderBuildInfo();
      serverPorts = {
        http: finiteNumber(config.httpPort, serverPorts.http),
        https: finiteNumber(config.httpsPort, serverPorts.https)
      };
      soundProfiles = Array.isArray(config.soundProfiles) ? config.soundProfiles : [];
      renderSoundProfileOptions();
      presets.classic.rotationMinutes = finiteNumber(config.classicRotationMinutes, presets.classic.rotationMinutes);
      presets.classic.breakSeconds = finiteNumber(config.classicBreakSeconds, presets.classic.breakSeconds);
      presets.festival.rotationMinutes = finiteNumber(config.festivalRoundMinutes, presets.festival.rotationMinutes);
      presets.festival.breakSeconds = finiteNumber(config.festivalBreakMinutes, Math.round(presets.festival.breakSeconds / 60)) * 60;
      presets.final.rotationMinutes = finiteNumber(config.finalRotationMinutes, presets.final.rotationMinutes);
      if (startupConfigApplied) return;
      startupConfigApplied = true;
      els.flashToggle.checked = config.flashing !== false;
      globalSoundEnabled = config.sound !== false;
      primarySoundEnabled = readPrimarySoundPreference(globalSoundEnabled);
      if (config.primaryBrowser && !state.running && !state.elapsedBeforePause) {

    function applySoundProfile(profileId) {
      const profile = soundProfiles.find((item) => item.id === profileId) || null;
      state.soundProfile = profile?.id || "";
      if (profile) els.soundProfileSelect.value = profile.id;
      const nextAudioSources = {
        start: String(profile?.sources?.start || ""),
        end: String(profile?.sources?.end || profile?.sources?.start || ""),
        minute: String(profile?.sources?.minute || ""),
        warn: String(profile?.sources?.warn || ""),
        festival60: String(profile?.sources?.festival60 || ""),
        festival30: String(profile?.sources?.festival30 || ""),
        festival10: String(profile?.sources?.festival10 || ""),
        festival5: String(profile?.sources?.festival5 || "")
      };
      if (!audioKinds.some((kind) => audioSources[kind] !== nextAudioSources[kind])) return;
      audioSources = nextAudioSources;
      audioBuffers = { start: null, end: null, minute: null, warn: null, festival60: null, festival30: null, festival10: null, festival5: null };
