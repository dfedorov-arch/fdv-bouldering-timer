    function updateParameterLabels() {
      const festivalMode = isFestivalMode();
      els.rotationInputLabel.textContent = festivalMode ? t("roundMinutes") : t("rotationMinutes");
      els.breakInputLabel.textContent = festivalMode ? t("breakMinutes") : t("breakSeconds");
      els.rotationInputUnit.textContent = t("minuteUnit");
      els.breakInputUnit.textContent = festivalMode ? t("minuteUnit") : t("secondUnit");
      els.breakSeconds.max = festivalMode ? "240" : "3600";
      els.breakSeconds.step = "1";
      els.breakSeconds.disabled = false;
      els.festivalAnnouncementsRow.hidden = !festivalMode;
    }

    function setInputsFromDraft(draft) {
      if (!draft) return;
      updateParameterLabels();
      els.climbMinutes.value = draft.rotationMinutes;
      els.breakSeconds.value = isFestivalMode() ? Math.round(draft.breakSeconds / 60) : draft.breakSeconds;
      if (draft.startHours !== undefined) {
        els.startHours.value = draft.startHours === "" ? "" : String(draft.startHours).padStart(2, "0");
      }
      if (draft.startMinutes !== undefined) {
        els.startMinutes.value = draft.startMinutes === "" ? "" : String(draft.startMinutes).padStart(2, "0");
      }
    }

    function readSettings() {
      return activeSettingsFromDraft();
    }

    function activeSettings() {
      return state.activeSettings || readSettings();
    }

    function buildTimeline(settings = readSettings()) {
      state.activeSettings = { ...settings };
      const timeline = [
        { type: "rotation", label: t("rotation"), duration: settings.rotationSeconds },
        { type: "break", label: t("break"), duration: settings.breakSeconds }
      ].filter((segment) => segment.duration > 0);

      state.timeline = timeline;
      return timeline;
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Math.ceil(seconds));
      const mins = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function timeParts(seconds) {
      const safeSeconds = Math.max(0, Math.ceil(seconds));
      const mins = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return {
        minutes: String(mins).padStart(2, "0"),
        seconds: String(secs).padStart(2, "0")
      };
    }

    function setDisplayTime(seconds) {
      const parts = timeParts(seconds);
      const label = `${parts.minutes}:${parts.seconds}`;
      if (label === lastDisplayTimeLabel) return;
      lastDisplayTimeLabel = label;
      els.timeMinutes.textContent = parts.minutes;
      els.timeSeconds.textContent = parts.seconds;
      els.time.setAttribute("aria-label", label);
      scheduleFitTimer();
    }

    function elapsedSeconds() {
      if (!state.running) return state.elapsedBeforePause;
      if (state.serverStartedAt) {
        return Math.max(0, (serverNow() - state.serverStartedAt) / 1000);
      }
      return (performance.now() - state.startedAt - state.accumulatedPause) / 1000;
    }

    function getCurrentSegment(elapsed) {
      const timeline = state.timeline.length ? state.timeline : buildTimeline();
      if (!timeline.length) return null;
      const settings = activeSettings();
      if (settings.oneShot) {
        const totalDuration = settings.rotationSeconds + settings.breakSeconds;
        if (elapsed >= totalDuration) return null;
        const isBreak = settings.breakSeconds > 0 && elapsed >= settings.rotationSeconds;
        return {
          type: isBreak ? "break" : "rotation",
          label: isBreak ? t("break") : t("rotation"),
          cycle: 1,
          start: isBreak ? settings.rotationSeconds : 0,
          end: isBreak ? totalDuration : settings.rotationSeconds
        };
      }
      const cycleDuration = settings.rotationSeconds + settings.breakSeconds;
      const safeCycleDuration = Math.max(1, cycleDuration);
      const cycleIndex = Math.floor(elapsed / safeCycleDuration);
      const offset = elapsed % safeCycleDuration;
      const isBreak = settings.breakSeconds > 0 && offset >= settings.rotationSeconds;
      const start = cycleIndex * safeCycleDuration + (isBreak ? settings.rotationSeconds : 0);
      const duration = isBreak ? settings.breakSeconds : settings.rotationSeconds;

      return {
        type: isBreak ? "break" : "rotation",
        label: isBreak ? t("break") : t("rotation"),
        cycle: cycleIndex + 1,
        start,
        end: start + duration
      };
    }

    async function setPreset(name) {
      if (!controlsAvailable()) return;
      state.activePreset = name;
      els.presets.forEach((button) => button.classList.toggle("active", button.dataset.preset === name));
      if (presets[name]) {
        setInputsFromDraft(presets[name]);
      }
      if (!standaloneMode) {
        sendServerAction("settings", {
          activePreset: state.activePreset,
          settings: draftSettings()
        });
      } else {
        saveOfflineSnapshot();
      }
      if (state.running || state.elapsedBeforePause > 0) {
        return;
      }
      hardReset(false);
    }

    function setCustomPreset() {
      state.activePreset = "";
      els.presets.forEach((button) => button.classList.remove("active"));
    }

    function draftSettings() {
      const festivalMode = isFestivalMode();
      const finalMode = isFinalMode();
      const fallbackPreset = presets[state.activePreset] || presets.classic;
      const fallbackBreak = festivalMode ? Math.round(presets.festival.breakSeconds / 60) : fallbackPreset.breakSeconds;
      const maxBreak = festivalMode ? 240 : 3600;
      const breakValue = clampNumber(els.breakSeconds.value, 0, maxBreak, fallbackBreak);
      const breakSeconds = finalMode && els.breakSeconds.value === ""
        ? ""
        : festivalMode ? breakValue * 60 : breakValue;
      return {
        rotationMinutes: clampNumber(els.climbMinutes.value, 1, 240, fallbackPreset.rotationMinutes),
        breakSeconds,
        oneShot: finalMode,
        startHours: els.startHours.value,
        startMinutes: els.startMinutes.value
      };
    }

    function activeSettingsFromDraft() {
      const draft = draftSettings();
      return {
        rotationSeconds: draft.rotationMinutes * 60,
        breakSeconds: Number(draft.breakSeconds) || 0,
        oneShot: draft.oneShot
      };
    }

    function applyServerState(remote, options = {}) {
      if (!remote || typeof remote !== "object") return;
      markServerContact();
      if (standaloneMode) {
        pendingServerState = remote;
        return;
      }
      applyStartupConfig(remote.config);
      updateServerTiming(remote, options.timing, {
        forceClockCorrection: Boolean(options.forceClockCorrection),
        resetClockSamples: Boolean(options.resetClockSamples),
        preserveClockRate: Boolean(options.preserveClockRate)
      });

      state.running = Boolean(remote.running);
      if (remote.language && remote.language !== language) applyLanguage(remote.language);
      state.completed = Boolean(remote.completed);
      state.countdownOnly = Boolean(remote.countdownOnly);
      state.waitingForManualStart = Boolean(remote.waitingForManualStart);
      state.manualStartLeadMs = Number(remote.manualStartLeadMs || 0);
      state.manualStartDisplayHold = Boolean(remote.manualStartDisplayHold);
      state.serverStartedAt = Number(remote.startedAt || 0);
      state.elapsedBeforePause = Number(remote.elapsedBeforePause || 0);
      state.activePreset = remote.activePreset || "";
      state.activeSettings = remote.activeSettings || activeSettingsFromDraft();
      const festivalAnnouncementsChanged = (remote.festivalAnnouncements !== false) !== state.festivalAnnouncements;
      state.festivalAnnouncements = remote.festivalAnnouncements !== false;
      applySoundProfile(String(remote.soundProfile || ""));
      buildTimeline(state.activeSettings);
      const remoteClients = Array.isArray(remote.clients) ? remote.clients : [];
      const diagnosticsIncluded = remote.diagnosticsIncluded !== false && Array.isArray(remote.clients);
      const ownClient = remoteClients.find((client) => client.id === clientId);
      const nextAudioOffset = Number(ownClient?.audioUserOffset ?? remote.audioUserOffset ?? 0);
      const audioOffsetChanged = nextAudioOffset !== audioUserOffsetMs;
      audioUserOffsetMs = nextAudioOffset;

      if (remote.draftSettings) {
        setInputsFromDraft(remote.draftSettings);
      } else {
        updateParameterLabels();
      }

      els.presets.forEach((button) => {
        button.classList.toggle("active", button.dataset.preset === state.activePreset);
      });

      const primaryClientId = remote.primaryClientId || null;
      const isPrimary = primaryClientId === clientId;
      state.primaryClientId = primaryClientId;
      state.primaryPinSet = Boolean(remote.primaryPinSet);
      state.ownPrimaryPinSaved = Boolean(remote.ownPrimaryPinSaved);
      state.ownPrimaryPinValue = String(remote.ownPrimaryPinValue || "");
      isPrimaryClient = isPrimary;
      isViewerClient = Boolean(primaryClientId && !isPrimary);
      updatePrimaryComputerFlag(diagnosticsIncluded ? remoteClients : lastKnownClients, primaryClientId);
      instancesSoundEnabled = Boolean(remote.instancesSound);
      instancesFullscreenEnabled = Boolean(remote.instancesFullscreen);
      globalSoundEnabled = remote.globalSound !== false;
      els.primaryToggle.checked = isPrimary;
      els.instancesSoundToggle.checked = instancesSoundEnabled;
      els.instancesFullscreenToggle.checked = instancesFullscreenEnabled;
      els.festivalAnnouncementsToggle.checked = state.festivalAnnouncements;
      els.soundLabel.textContent = isPrimary ? t("primarySound") : t("sound");
      els.soundToggle.checked = isPrimary ? primarySoundEnabled : globalSoundEnabled;
      document.body.classList.toggle("primary-active", isPrimary);
      document.body.classList.toggle("viewer-mode", isViewerClient);
      revealControlsIfAllowed();
      syncDiagnosticsStream();
      applyViewerFullscreenPreference();
      scheduleFitTimer();

      if (!state.running) {
        clearSignalTimers();
        lastSegmentIndex = -1;
        if (state.elapsedBeforePause === 0) lastPhaseSignalKey = "";
      } else if (state.countdownOnly) {
        clearSignalTimers();
        lastSegmentIndex = -1;
      } else if (options.rescheduleSignals || audioOffsetChanged || festivalAnnouncementsChanged) {
        const elapsed = elapsedSeconds();
        const segment = getCurrentSegment(elapsed);
        if (segment) {
          const remaining = segment.end - elapsed;
          const duration = segment.end - segment.start;
          lastSegmentIndex = `${segment.cycle}:${segment.type}`;
          const waitingForStart = state.serverStartedAt > serverNow() + 80;
          scheduleSegmentSignals(segment, remaining, duration, waitingForStart ? false : Boolean(options.includePhaseSignal));
          if (waitingForStart && !state.activeSettings.oneShot) {
            scheduleBufferedSignalAt(segment, state.serverStartedAt, "start", true);
          }
        }
      }

      lastServerVersion = Number(remote.version || lastServerVersion);
      lastRemoteRunning = state.running;
      syncButtons();
      if (diagnosticsIncluded) renderBrowserList(remoteClients);
      render();
      saveOfflineSnapshot();
    }

    function applyServerRuntimeClockState(remote) {
      if (!remote || typeof remote !== "object" || standaloneMode) return;
      const nextActiveSettings = remote.activeSettings || state.activeSettings;
      const settingsChanged = JSON.stringify(nextActiveSettings || {}) !== JSON.stringify(state.activeSettings || {});
      state.running = Boolean(remote.running);
      state.completed = Boolean(remote.completed);
      state.countdownOnly = Boolean(remote.countdownOnly);
      state.waitingForManualStart = Boolean(remote.waitingForManualStart);
      state.manualStartLeadMs = Number(remote.manualStartLeadMs || 0);
      state.manualStartDisplayHold = Boolean(remote.manualStartDisplayHold);
      state.serverStartedAt = Number(remote.startedAt || 0);
      state.elapsedBeforePause = Number(remote.elapsedBeforePause || 0);
      state.activePreset = remote.activePreset || state.activePreset || "";
      state.activeSettings = nextActiveSettings || activeSettingsFromDraft();
      if (settingsChanged) buildTimeline(state.activeSettings);
      lastRemoteRunning = state.running;
      syncButtons();
      render();
      saveOfflineSnapshot();
    }

    async function sendServerAction(type, payload = {}, options = {}) {
      if (!serverAvailable || standaloneMode) return false;
      const isRuntimeCommand = runtimeCommandTypes.has(type);
      const commandId = isRuntimeCommand ? `${clientId}:${++commandSeq}` : "";
      const baseVersion = isRuntimeCommand && lastServerVersion ? lastServerVersion : undefined;
      const intendedServerTime = isRuntimeCommand ? serverNow() : undefined;
      const attempts = isRuntimeCommand ? 3 : 1;

      for (let attempt = 0; attempt < attempts; attempt += 1) {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), syncRequestTimeoutMs);
        try {
          const timing = {
            date0: Date.now(),
            perf0: performance.now()
          };
          const response = await fetch("/api/action", {
            method: "POST",
            headers: { "content-type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify({
              type,
              commandId,
              baseVersion,
              intendedServerTime,
              ...clientDiagnostics(),
              ...payload
            })
          });
          timing.date1 = Date.now();
          timing.perf1 = performance.now();
          const remote = await response.json().catch(() => null);
          if (response.status === 409 && remote) {
            applyServerState(remote, { ...options, timing, includePhaseSignal: false });
            return "conflict";
          }
          if ((response.status === 400 || response.status === 403 || response.status === 429) && remote) {
            applyServerState(remote, { ...options, timing, includePhaseSignal: false });
            if (remote.primaryPinBlockedUntil) return "pin-blocked";
            if (remote.primaryPinRequired) return "pin-required";
            if (remote.primaryPinInvalidFormat) return "pin-invalid";
            if (remote.primaryPinDenied) return "pin-denied";
            return false;
          }
          if (!response.ok || !remote) throw new Error("Server action failed");
          if (options.applyResponse !== false) applyServerState(remote, { ...options, timing });
          else updateServerTiming(remote, timing);
          return true;
        } catch (error) {
          if (attempt >= attempts - 1) {
            markServerFailure(true);
            return false;
          }
          await new Promise((resolve) => window.setTimeout(resolve, 160 * (attempt + 1)));
        } finally {
          window.clearTimeout(timeout);
        }
      }
      return false;
    }

    async function syncFromServer(options = {}) {
      if (syncRequestInFlight) return false;
      syncRequestInFlight = true;
      const requestGeneration = syncRequestGeneration;
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), syncRequestTimeoutMs);
      try {
        const timing = {
          date0: Date.now(),
          perf0: performance.now()
        };
        const params = new URLSearchParams({
          ...clientDiagnostics(),
          diagnostics: (isPrimaryClient || !state.primaryClientId) ? "1" : "0"
        });
        const response = await fetch(`/api/state?${params}`, {
          cache: "no-store",
          signal: controller.signal
        });
        timing.date1 = Date.now();
        timing.perf1 = performance.now();
        if (!response.ok) throw new Error("Server state failed");
        const remote = await response.json();
        if (requestGeneration !== syncRequestGeneration) return false;
        markServerContact();
        if (standaloneMode) {
          pendingServerState = remote;
          return true;
        }
        if (offlineReloadMode) {
          offlineReloadMode = false;
          document.body.classList.remove("offline-reload-mode");
          applyServerState(remote, { ...options, rescheduleSignals: true, includePhaseSignal: false, timing });
          if (options.resumeSnap || resumeSnapPending) clearResumeSnapPending(true);
          maybeBurstSync(options);
          return true;
        }
        const version = Number(remote.version || 0);
        if (version && version < lastServerVersion) {
          updateServerTiming(remote, timing, options);
          if (options.resumeSnap || resumeSnapPending) clearResumeSnapPending(true);
          return true;
        }
        if (version !== lastServerVersion) {
          const isRemoteStart = Date.now() >= suppressPhaseSignalsUntil
            && lastServerVersion !== 0
            && !lastRemoteRunning
            && Boolean(remote.running)
            && Number(remote.elapsedBeforePause || 0) === 0
            && Number(remote.elapsed || 0) < 2;
          applyServerState(remote, { ...options, rescheduleSignals: true, includePhaseSignal: isRemoteStart, timing });
        } else if (options.forceApply) {
          applyServerState(remote, { ...options, rescheduleSignals: true, includePhaseSignal: false, timing });
        } else {
          updateServerTiming(remote, timing, options);
          applyServerRuntimeClockState(remote);
          if (remote.diagnosticsIncluded !== false && Array.isArray(remote.clients)) {
            updatePrimaryComputerFlag(remote.clients, remote.primaryClientId || null);
            renderBrowserList(remote.clients);
          }
        }
        if (options.resumeSnap || resumeSnapPending) clearResumeSnapPending(true);
        maybeBurstSync(options);
        return true;
      } catch (error) {
        markServerFailure();
        return false;
      } finally {
        window.clearTimeout(timeout);
        if (requestGeneration === syncRequestGeneration) syncRequestInFlight = false;
      }
    }

    function maybeBurstSync(options = {}) {
      const error = Number(syncQuality.error);
      const now = Date.now();
      if (options.skipBurst || options.burst || !Number.isFinite(error) || error <= 300) return;
      if (now - lastBurstSyncAt < 5000) return;
      lastBurstSyncAt = now;
      burstSync();
    }

    async function burstSync() {
      for (let i = 0; i < 5; i += 1) {
        await new Promise((resolve) => window.setTimeout(resolve, i === 0 ? 0 : 120));
        await syncFromServer({ skipBurst: true, burst: true });
      }
    }

    function startSync() {
      syncFromServer();
      startEventStream();
      syncTimer = window.setInterval(syncFromServer, 2000);
      window.setInterval(checkSseHeartbeat, 5000);
      window.setInterval(syncDiagnosticsStream, 5000);
    }

    function registerOfflineServiceWorker() {
      if (!("serviceWorker" in navigator) || window.location.protocol === "file:" || !window.isSecureContext) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then((registration) => registration.update().catch(() => {}))
          .catch(() => {});
      });
    }

    function markSseEvent() {
      lastSseEventAt = performance.now();
      markServerContact();
    }

    function startEventStream() {
      if (!window.EventSource || eventSource) return;
      const params = new URLSearchParams({ clientId });
      const generation = ++eventStreamGeneration;
      eventSource = new EventSource(`/api/events?${params}`);
      eventSource.onopen = () => {
        if (generation !== eventStreamGeneration) return;
        eventSourceConnected = true;
        markSseEvent();
      };
      eventSource.addEventListener("ping", (event) => {
        if (generation !== eventStreamGeneration) return;
        markSseEvent();
      });
      eventSource.addEventListener("state", (event) => {
        if (generation !== eventStreamGeneration) return;
        try {
          const remote = JSON.parse(event.data);
          markSseEvent();
          if (standaloneMode) {
            pendingServerState = remote;
            return;
          }
          if (offlineReloadMode) {
            offlineReloadMode = false;
            document.body.classList.remove("offline-reload-mode");
            applyServerState(remote, { rescheduleSignals: true, includePhaseSignal: false });
            return;
          }
          const version = Number(remote.version || 0);
          if (version && version < lastServerVersion) return;
          const isRemoteStart = Date.now() >= suppressPhaseSignalsUntil
            && version !== lastServerVersion
            && lastServerVersion !== 0
            && !lastRemoteRunning
            && Boolean(remote.running)
            && Number(remote.elapsedBeforePause || 0) === 0
            && Number(remote.elapsed || 0) < 2;
          applyServerState(remote, {
            rescheduleSignals: version !== lastServerVersion,
            includePhaseSignal: isRemoteStart
          });
        } catch (error) {}
      });
      eventSource.addEventListener("audio-test", (event) => {
        if (generation !== eventStreamGeneration) return;
        try {
          markSseEvent();
          handleAudioTest(JSON.parse(event.data));
        } catch (error) {}
      });
      eventSource.addEventListener("audio-wake", (event) => {
        if (generation !== eventStreamGeneration) return;
        try {
          markSseEvent();
          const command = JSON.parse(event.data);
          wakeAudioOutput(command.kind || "prewarm");
        } catch (error) {}
      });
      eventSource.addEventListener("legacy-mode", (event) => {
        if (generation !== eventStreamGeneration) return;
        try {
          markSseEvent();
          const command = JSON.parse(event.data);
          if (command.enabled) {
            window.location.replace("/legacy.html");
          } else {
            try {
              sessionStorage.setItem("boulderingTimerForceModern", "1");
            } catch (error) {}
            window.location.replace("/");
          }
        } catch (error) {}
      });
      eventSource.onerror = () => {
        if (generation !== eventStreamGeneration) return;
        eventSourceConnected = false;
        markServerFailure();
      };
    }

    function restartEventStream() {
      eventStreamGeneration += 1;
      if (eventSource) {
        try {
          eventSource.close();
        } catch (error) {}
      }
      eventSource = null;
      eventSourceConnected = false;
      startEventStream();
    }

    function shouldUseDiagnosticsStream() {
      return !standaloneMode && (isPrimaryClient || !state.primaryClientId);
    }

    function syncDiagnosticsStream() {
      if (!window.EventSource || !shouldUseDiagnosticsStream()) {
        stopDiagnosticsStream();
        return;
      }
      startDiagnosticsStream();
    }

    function startDiagnosticsStream() {
      if (diagnosticsEventSource) return;
      const params = new URLSearchParams({ clientId });
      const generation = ++diagnosticsStreamGeneration;
      diagnosticsEventSource = new EventSource(`/api/diagnostics/events?${params}`);
      diagnosticsEventSource.onopen = () => {
        if (generation !== diagnosticsStreamGeneration) return;
        markSseEvent();
      };
      diagnosticsEventSource.addEventListener("ping", () => {
        if (generation !== diagnosticsStreamGeneration) return;
        markSseEvent();
      });
      diagnosticsEventSource.addEventListener("diagnostics", (event) => {
        if (generation !== diagnosticsStreamGeneration) return;
        try {
          markSseEvent();
          const diagnostics = JSON.parse(event.data);
          if (Array.isArray(diagnostics.clients)) {
            updatePrimaryComputerFlag(diagnostics.clients, diagnostics.primaryClientId || state.primaryClientId || null);
            renderBrowserList(diagnostics.clients);
          }
        } catch (error) {}
      });
      diagnosticsEventSource.onerror = () => {
        if (generation !== diagnosticsStreamGeneration) return;
        stopDiagnosticsStream();
      };
    }

    function stopDiagnosticsStream() {
      diagnosticsStreamGeneration += 1;
      if (diagnosticsEventSource) {
        try {
          diagnosticsEventSource.close();
        } catch (error) {}
      }
      diagnosticsEventSource = null;
    }

    function checkSseHeartbeat() {
      if (resumeSyncInProgress || resumeSnapPending) return;
      if (!eventSource || !eventSourceConnected) return;
      if (performance.now() - lastSseEventAt <= sseSilentRestartMs) return;
      sseRestarts += 1;
      restartEventStream();
      syncDiagnosticsStream();
      syncRequestGeneration += 1;
      syncRequestInFlight = false;
      syncFromServer({
        forceApply: true,
        forceClockCorrection: true,
        resetClockSamples: true
      });
    }

    function clearResumeSnapPending(renderAfter = false) {
      if (resumeSnapTimer) {
        window.clearTimeout(resumeSnapTimer);
        resumeSnapTimer = null;
      }
      if (!resumeSnapPending) return;
      resumeSnapPending = false;
      document.body.classList.remove("resume-sync-pending");
      lastDisplayTimeLabel = "";
      if (renderAfter) render();
    }

    function beginResumeSnapPending() {
      if (!mobileResumeSyncEnabled || standaloneMode || !shouldKeepDisplayFresh()) return false;
      resumeSnapPending = true;
      resumeSnapStartedAt = performance.now();
      document.body.classList.add("resume-sync-pending");
      if (resumeSnapTimer) window.clearTimeout(resumeSnapTimer);
      resumeSnapTimer = window.setTimeout(() => clearResumeSnapPending(true), resumeSnapMaxWaitMs);
      return true;
    }

    function markResumeDisplayStale() {
      if (!mobileResumeSyncEnabled || standaloneMode || !shouldKeepDisplayFresh()) return;
      resumeSnapPending = true;
      resumeSnapStartedAt = performance.now();
      document.body.classList.add("resume-sync-pending");
    }

    function holdClockRateForResume() {
      syncQuality = {
        ...syncQuality,
        rate: serverClockRate,
        rateConfidence: serverClockRateConfidence || "resume-held",
        rateGateReason: "resume-held",
        rateAcceptedPpm: Math.round((serverClockRate - 1) * 1000000)
      };
    }

    function shouldResetSignalsOnResume(event = null) {
      if (event?.persisted) return true;
      if (!pageHiddenAt) return false;
      return Date.now() - pageHiddenAt >= staleResumeAfterMs;
    }

    async function resumeClientSync(options = {}) {
      const now = Date.now();
      const resetStaleSignals = Boolean(options.resetStaleSignals);
      if (!resetStaleSignals && (resumeSyncInProgress || resumeSnapPending)) return;
      if (!resetStaleSignals && now - lastResumeSyncAt < 1200) return;
      const resumeSnap = resetStaleSignals && beginResumeSnapPending();
      syncRequestGeneration += 1;
      syncRequestInFlight = false;
      if (resetStaleSignals) {
        resumeSyncInProgress = true;
        clearSignalTimers(false, true);
        reanchorServerClockModel("resume-held");
        holdClockRateForResume();
        lastSegmentIndex = -1;
        suppressPhaseSignalsUntil = now + 2500;
      } else {
        clearResumeSnapPending(false);
      }
      lastResumeSyncAt = now;
      pageHiddenAt = 0;
      requestScreenWakeLock();
      restartEventStream();
      syncDiagnosticsStream();
      try {
        await syncFromServer({
          forceApply: true,
          forceClockCorrection: true,
          resetClockSamples: true,
          preserveClockRate: true,
          resumeSnap
        });
      } finally {
        if (resetStaleSignals) resumeSyncInProgress = false;
      }
      window.setTimeout(() => syncFromServer({ forceApply: true, preserveClockRate: resetStaleSignals }), 600);
    }

    function drawSchedule(segment) {
      const cycleNumber = segment?.cycle || 1;
      const html = state.timeline.map((item, index) => {
        const classes = ["chip"];
        if (segment && item.type === segment.type) classes.push("current");
        if (item.type === "break") classes.push("resting");
        const name = item.type === "rotation" ? t("rotation") : t("break");
        const cycle = item.type === "break" ? `<span class="chip-cycle">${t("cycle")} ${cycleNumber}</span>` : "";
        return `<div class="${classes.join(" ")}"><span>${name}</span>${cycle}<span>${formatTime(item.duration)}</span></div>`;
      }).join("");
      els.schedule.innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function formatMs(value) {
      if (value === null || value === undefined || value === "") return "n/a";
      return Number.isFinite(Number(value)) ? `${Math.round(Number(value))} ${t("ms")}` : "n/a";
    }

    function clientAddress(address = "") {
      return String(address).replace(/^::ffff:/, "");
    }

    function operatingSystem(userAgent = "") {
      if (/Android/i.test(userAgent)) return "Android";
      if (/iPhone|iPad|iPod/i.test(userAgent)) return "iOS";
      if (/Mac OS X|Macintosh/i.test(userAgent)) return "macOS";
      if (/Windows/i.test(userAgent)) return "Windows";
      if (/Linux/i.test(userAgent)) return "Linux";
      return "OS";
    }

    function compactUserAgent(userAgent = "") {
      const rules = [
        ["Yandex", /YaBrowser\/(\d+)/], ["Edge", /EdgA?\/(\d+)/],
        ["Edge iOS", /EdgiOS\/(\d+)/], ["Opera", /OPR\/(\d+)/],
        ["Samsung", /SamsungBrowser\/(\d+)/], ["Chrome iOS", /CriOS\/(\d+)/],
        ["Firefox iOS", /FxiOS\/(\d+)/], ["Firefox", /Firefox\/(\d+)/],
        ["Safari", /Version\/(\d+).*Safari\//], ["Chrome", /Chrome\/(\d+)/],
        ["Chrome", /Chromium\/(\d+)/]
      ];
      const match = rules.map(([name, pattern]) => {
        const result = userAgent.match(pattern);
        return result ? { name, version: result[1] || "" } : null;
      }).find(Boolean) || { name: "Browser", version: "" };
      return `${match.name}${match.version ? ` ${match.version}` : ""} ${operatingSystem(userAgent)}`;
    }

    function refreshStandaloneBrowserList() {
      if (!standaloneMode || !els.browserList) return;
      const diagnostics = clientDiagnostics();
      renderBrowserList([{
        ...diagnostics,
        id: clientId,
        firstSeen: standaloneClientFirstSeen,
        order: 0,
        label: compactUserAgent(navigator.userAgent),
        browser: compactUserAgent(navigator.userAgent).split(" ")[0],
        userAgent: navigator.userAgent,
        address: "",
        displayAddress: "",
        protocol: window.location.protocol === "file:" ? "FILE" : "LOCAL",
        connected: true,
        role: t("standaloneTitle"),
        age: Date.now() - standaloneClientFirstSeen,
        audioUserOffset: audioUserOffsetMs
      }]);
    }

    function deviceType(userAgent = "") {
      if (/iPad|Tablet/i.test(userAgent)) return "tablet";
      if (/Mobi|Android|iPhone|iPod/i.test(userAgent)) return "mobile";
      return "desktop";
    }

    function diagChip(label, status, title, attributes = "") {
      const className = `diag-chip${status && status !== "good" ? ` ${status}` : ""}`;
      return `<span class="${className}" title="${escapeHtml(title)}"${attributes}>${escapeHtml(label)}</span>`;
    }

    function thresholdStatus(value, warnLimit, badLimit, missingIsBad = true) {
      const number = Number(value);
      if (!Number.isFinite(number)) return missingIsBad ? "bad" : "warn";
      if (number > badLimit) return "bad";
      if (number > warnLimit) return "warn";
      return "good";
    }

    function browserLink(displayIp, clients) {
      const primary = clients.find((client) => client.id === state.primaryClientId);
      const protocol = primary?.protocol === "HTTPS" ? "https" : "http";
      const port = protocol === "https" ? serverPorts.https : serverPorts.http;
      return `${protocol}://${displayIp}:${port}/`;
    }

    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value);
        return true;
      } catch (error) {}

      const input = document.createElement("textarea");
      input.value = value;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.opacity = "0";
      document.body.appendChild(input);
      input.select();
      let copied = false;
      try {
        copied = document.execCommand("copy");
      } catch (error) {}
      input.remove();
      return copied;

          legacyChip,
          diagChip("NET", netStatus, `Соединение: ${clientConnected ? "онлайн" : "нет связи"}; задержка ${formatMs(client.latency)}; зелёный ≤100 мс, жёлтый ≤200 мс, красный >200 мс`),
          diagChip("SYNC", syncStatus, `${hasSyncError ? "Оценка ошибки синхронизации" : "Приблизительная оценка по задержке сети"}: ${formatMs(estimatedSyncError)}; разброс ${formatMs(client.syncJitter)}; замеров ${client.syncSamples || "n/a"}${syncRateDetailsText}; зелёный ≤100 мс, жёлтый ≤300 мс, красный >300 мс`),
          diagChip("AUDIO", audioClasses, `Звук разрешён: ${yesNo(client.soundAllowed !== false)}; разблокирован тапом: ${yesNo(client.audioUnlocked === true)}; ${t("audioOffsetUser")}: ${formatMs(userAudioOffset)}`, ` data-audio-client="${escapeHtml(client.id)}"`),
          diagChip("WAKE", wakeOk ? "good" : "bad", `Wake Lock поддерживается: ${yesNo(client.wakeLockSupported === true)}; активен: ${yesNo(client.wakeLockActive === true)}`),
          diagChip("SSE", sseOk ? "good" : "bad", `Мгновенные события сервера: поддержка ${yesNo(client.eventSourceSupported === true)}; подключено ${yesNo(sseOk)}`),

        ]) : (standaloneSelf ? enLocalChips : [

          diagChip("SYNC", syncStatus, `${hasSyncError ? "Estimated synchronization error" : "Approximate estimate from network latency"}: ${formatMs(estimatedSyncError)}; jitter ${formatMs(client.syncJitter)}; samples ${client.syncSamples || "n/a"}${syncRateDetailsText}; green ≤100 ms, yellow ≤300 ms, red >300 ms`),
          diagChip("AUDIO", audioClasses, `Sound allowed: ${yesNo(client.soundAllowed !== false)}; unlocked by tap: ${yesNo(client.audioUnlocked === true)}; ${t("audioOffsetUser")}: ${formatMs(userAudioOffset)}`, ` data-audio-client="${escapeHtml(client.id)}"`),

    function canPlaySound() {
      if (standaloneMode) return els.soundToggle.checked;
      if (isPrimaryClient) return primarySoundEnabled;
      if (isSameComputerAsPrimary) return false;
      if (isViewerClient) return instancesSoundEnabled;
      return globalSoundEnabled;
    }

    function updatePrimaryComputerFlag(clients = [], primaryClientId = null) {
      if (!primaryClientId || primaryClientId === clientId) {
        isSameComputerAsPrimary = false;
        return;
      }
      const self = clients.find((client) => client.id === clientId);
      const primary = clients.find((client) => client.id === primaryClientId);
      isSameComputerAsPrimary = Boolean(self?.computerKey && primary?.computerKey && self.computerKey === primary.computerKey);
    }

    function pickSpeechVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const femaleHints = ["female", "irina", "alena", "alyona", "elena", "milena", "svetlana", "tatyana", "oksana"];
      const languageVoices = voices.filter((voice) => voice.lang.toLowerCase().startsWith(language));
      speechVoice = languageVoices.find((voice) => femaleHints.some((hint) => voice.name.toLowerCase().includes(hint)))
        || languageVoices[0]
        || null;
      return speechVoice;
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.addEventListener("voiceschanged", pickSpeechVoice);
      pickSpeechVoice();
    }

    function speak(text) {
      if (!canPlaySound()) return;
      if (!("speechSynthesis" in window)) {
        beep("minute");
        return;
      }
      const voice = pickSpeechVoice();
      if (!voice) {
        beep("minute");
        return;
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = language === "en" ? "en-US" : "ru-RU";
      utterance.voice = voice;
      utterance.rate = 0.94;
      utterance.pitch = 1.08;
      utterance.volume = 1;
      try {
        window.speechSynthesis.speak(utterance);
      } catch (error) {
        beep("minute");
      }
    }

    function soundBuffer(kind) {
      return audioBuffers[kind] || null;
    }

    function soundSource(kind) {
      return audioSources[kind] || "";
    }

    function playHtmlAudio(kind) {
      const source = soundSource(kind);
      if (!source || !canPlaySound()) return false;
      try {
        const audio = new Audio(source);
        audio.preload = "auto";
        if (kind === "warn") audio.volume = 0.82;
        activeHtmlAudio.push(audio);
        audio.addEventListener("ended", () => {
          activeHtmlAudio = activeHtmlAudio.filter((item) => item !== audio);
        }, { once: true });
        audio.play().catch(() => {
          activeHtmlAudio = activeHtmlAudio.filter((item) => item !== audio);
          beepSynthetic(kind);
        });
        return true;
      } catch (error) {
        return false;
      }
    }

    function playBuffer(kind, delaySeconds = 0, preserveOnTransition = false, signalKey = "", onStarted = null) {
      if (!canPlaySound() || !audioContext) return false;
      const buffer = soundBuffer(kind);
      if (!buffer) return false;
      const source = audioContext.createBufferSource();
      const gain = audioContext.createGain();
      source.buffer = buffer;
      source.connect(gain).connect(audioContext.destination);
      const start = Math.max(audioContext.currentTime, audioContext.currentTime + Math.max(0, delaySeconds));
      gain.gain.setValueAtTime(kind === "warn" ? 0.82 : 1, start);
      const item = { node: source, start, preserveOnTransition, signalKey, started: false, playedTimer: null };
      const markStarted = () => {
        if (item.started) return;
        item.started = true;
        if (signalKey) markSignalPlayed(signalKey);
        onStarted?.();
      };
      item.playedTimer = window.setTimeout(markStarted, Math.max(0, (start - audioContext.currentTime) * 1000));
      source.start(start);
      source.stop(start + buffer.duration + 0.02);
      scheduledAudioNodes.push(item);
      source.onended = () => {
        if (item.playedTimer) window.clearTimeout(item.playedTimer);
        scheduledAudioNodes = scheduledAudioNodes.filter((entry) => entry.node !== source);
        if (signalKey && !scheduledAudioNodes.some((entry) => entry.signalKey === signalKey)) {
          scheduledSignalKeys.delete(signalKey);
        }
      };
      return true;
    }

    function scheduleDiagnosticSound(kind, targetServerTime) {
      const delaySeconds = Math.max(0, (targetServerTime - serverNow()) / 1000);
      const buffer = soundBuffer(kind);
      if (audioContext && buffer) {
        const source = audioContext.createBufferSource();
        const gain = audioContext.createGain();
        source.buffer = buffer;
        source.connect(gain).connect(audioContext.destination);
        const start = audioContext.currentTime + delaySeconds;
        gain.gain.setValueAtTime(kind === "warn" ? 0.82 : 1, start);

    async function handleAudioTest(command) {

      if (!testId || testId === lastAudioTestId) return;
      const everywhere = Boolean(command.everywhere);
      const isTarget = everywhere
        ? canPlaySound()

      if (!isTarget) return;

      try {

        if (audioContext.state === "suspended") await audioContext.resume();

      if (!Number.isFinite(baseServerTime)) return;
      const kind = ["start", "end", "minute", "warn"].includes(command.kind) ? command.kind : "start";
      const offsets = kind === "warn" ? [0, 1000, 2000, 3000, 4000] : [0];

    function beep(kind, delaySeconds = 0, scheduled = false, signalKey = "", preserveOnTransition = false, onStarted = null) {

      }
      return beepSynthetic(kind, delaySeconds, scheduled, signalKey, preserveOnTransition, onStarted);

    function beepSynthetic(kind, delaySeconds = 0, scheduled = false, signalKey = "", preserveOnTransition = false, onStarted = null) {

      const plans = {
        finish: [{ offset: 0, frequency: 220, duration: .36 }],
        minute: [
          { offset: 0, frequency: 700, duration: .18 },
          { offset: .28, frequency: 700, duration: .18 }
        ],
        warn: [{ offset: 0, frequency: 880, duration: .22, volume: .22 }],
        start: [
          { offset: 0, frequency: 760, duration: .9, volume: .3, type: "square", attack: .006 },
          { offset: 0, frequency: 380, duration: .9, volume: .12, type: "sine", attack: .006 }
        ],
        end: [
          { offset: 0, frequency: 760, duration: .9, volume: .3, type: "square", attack: .006 },
          { offset: 0, frequency: 380, duration: .9, volume: .12, type: "sine", attack: .006 }

        warm: [{ offset: 0, frequency: 440, duration: .08, volume: .006 }],
        prewarm: [{ offset: 0, frequency: 440, duration: .08, volume: .004 }]

      const now = audioContext.currentTime + Math.max(0, delaySeconds);
      const plan = plans[kind] || plans.start;
      plan.forEach(({ offset, frequency, duration, volume = .22, type = "sine", attack = .02 }, index) => {

        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain).connect(audioContext.destination);

        const itemOnStarted = index === 0 ? onStarted : null;
        const item = { node: osc, start, preserveOnTransition, signalKey: itemSignalKey, started: false, playedTimer: null };
        const markStarted = () => {
          if (item.started) return;
          item.started = true;
          if (itemSignalKey) markSignalPlayed(itemSignalKey);
          itemOnStarted?.();
        };
        osc.start(start);
        osc.stop(start + duration + 0.02);
        if (scheduled) {
          item.playedTimer = window.setTimeout(markStarted, Math.max(0, (start - audioContext.currentTime) * 1000));
          scheduledAudioNodes.push(item);
          osc.onended = () => {
            if (item.playedTimer) window.clearTimeout(item.playedTimer);
            scheduledAudioNodes = scheduledAudioNodes.filter((entry) => entry.node !== osc);

    function flash() {
      if (!els.flashToggle.checked) return;

      void document.body.offsetWidth;

    function signal(kind) {

    function wakeAudioOutput(kind = "prewarm") {

        return;

      flash();

    function shouldUseManualStartAudioLead() {

    function manualStartSignalKey(targetServerTime) {

    function scheduleManualStartWatchdog(targetServerTime) {

    }

    function scheduleSignal(segment, delaySeconds, kind, withFlash = true) {
      const safeDelay = Math.max(0, delaySeconds);

      }
      beep(kind, safeDelay, true);
      if (!withFlash) return;
      scheduleSegmentTimeout(segment, safeDelay, () => flash());
    }

    function serverTimeForElapsed(elapsed) {
      return state.serverStartedAt ? state.serverStartedAt + elapsed * 1000 : null;
    }

    function delayUntilServerTime(targetServerTime) {
      if (!targetServerTime) return 0;
      return Math.max(0, (targetServerTime - serverNow()) / 1000);
    }

    function isServerSignalCurrent(targetServerTime, graceMs = staleSignalGraceMs) {
      if (!targetServerTime) return true;
      return serverNow() - targetServerTime <= graceMs;
    }

    function shouldScheduleServerSignal(targetServerTime, graceMs = staleSignalGraceMs) {
      return Boolean(targetServerTime) && isServerSignalCurrent(targetServerTime, graceMs);
    }

    function lateGraceForSignal(kind, category = "") {
      if (category === "rotationBoundary") return signalLateGraceMs.rotationBoundary;
      if (kind === "warn") return signalLateGraceMs.warn;
      if (kind === "minute") return signalLateGraceMs.minute;
      if (kind && kind.startsWith("festival")) return signalLateGraceMs.festival;
      if (kind === "warm" || kind === "prewarm") return signalLateGraceMs.noncritical;

        }

    }

    function nextPhaseSignalKey(segment) {

      return `${segment.cycle + 1}:rotation`;
    }

    function transitionSoundKind(segment, finalTransition = false) {

    function applySoundPreferenceChange() {

      clearSignalTimers(false, !canPlaySound());
      if (!state.running || state.countdownOnly) {

        return;
      }
      const elapsed = elapsedSeconds();
      const segment = getCurrentSegment(elapsed);
      if (!segment) {

        return;

    function scheduleSegmentSignals(segment, remaining, duration, includePhase = true) {

        const totalDuration = settings.rotationSeconds + settings.breakSeconds;

      }

    function scheduleFestivalAnnouncements(segment, remaining) {

      festivalAnnouncements.forEach((announcement) => {
        if (remaining <= announcement.remaining) return;

    function scheduleSegmentTimeout(segment, delaySeconds, callback) {

    }

    function scheduleSegmentTimeoutAt(segment, targetServerTime, callback, options = {}) {

        els.cycleMeta.textContent = t("final");

        els.nextMeta.textContent = t("nextManual");

        syncButtons();
        return;

        setDisplayTime(0);
        els.status.textContent = t("completed");
        els.cycleMeta.textContent = t("final");
        els.rotationMeta.textContent = `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
        els.nextMeta.textContent = "";
        els.progressBar.style.width = "100%";
        drawSchedule(null);
        syncButtons();
        return;
      }

      if (isReady || !segment) {
        document.body.classList.remove("break-active");
        els.phase.textContent = t("readiness");
        els.phase.className = "phase ready";
        setDisplayTime(settings.rotationSeconds);
        els.status.textContent = t("ready");
        els.cycleMeta.textContent = `${t("cycle")} 1`;
        els.rotationMeta.textContent = `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
        els.nextMeta.textContent = t("nextStart");
        els.progressBar.style.width = "0%";
        drawSchedule(null);
        syncButtons();
        return;
      }

      const remaining = segment.end - elapsed;
      const duration = segment.end - segment.start;
      const donePercent = ((duration - remaining) / duration) * 100;
      const segmentKey = `${segment.cycle}:${segment.type}`;

      document.body.classList.toggle("break-active", segment.type === "break");
      document.body.classList.toggle("warning-active", segment.type === "rotation" && remaining > 0 && remaining <= 5);
      els.phase.textContent = segment.label;
      els.phase.className = `phase ${segment.type}`;
      setDisplayTime(remaining);
      els.status.textContent = state.running ? t("roundRunning") : t("pause");
      els.cycleMeta.textContent = `${t("cycle")} ${segment.cycle}`;
      els.rotationMeta.textContent = segment.type === "break"
        ? `${t("break")} ${formatTime(settings.breakSeconds)}`
        : `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
      els.nextMeta.textContent = segment.type === "break"
        ? settings.oneShot ? t("nextComplete") : t("nextRotation")
        : settings.oneShot ? t("nextComplete") : settings.breakSeconds > 0 ? t("nextBreak") : t("nextRotation");
      if (settings.oneShot && segment.type === "rotation" && settings.breakSeconds > 0) {
        els.nextMeta.textContent = t("nextBreak");
      }
      els.progressBar.style.width = `${Math.max(0, Math.min(100, donePercent))}%`;
      drawSchedule(segment);

      if (state.running && segmentKey !== lastSegmentIndex) {
        lastSegmentIndex = segmentKey;
        scheduleSegmentSignals(segment, remaining, duration, true);
      }

      if (state.running && remaining <= 6) {
        scheduleFinalWarnings(segment);
      }
    }

    function tick() {
      render();
      requestAnimationFrame(tick);
    }

    function renderWatchdog() {
      if (!shouldKeepDisplayFresh()) return;
      if (performance.now() - lastRenderAt < 3000) return;
      lastDisplayTimeLabel = "";
      render();
    }

    function isBeforeScheduledStart() {
      return state.running
        && state.elapsedBeforePause === 0
        && state.serverStartedAt > serverNow()
        && !isManualStartHoldPending();
    }

    function shouldDisableAudioTestButtons() {
      return !controlsAvailable() || (state.running && !isBeforeScheduledStart());
    }

    function syncButtonsWhenScheduledStartStateChanges() {
      const beforeScheduledStart = isBeforeScheduledStart();
      if (beforeScheduledStart === lastBeforeScheduledStart) return;
      lastBeforeScheduledStart = beforeScheduledStart;
      syncButtons();
    }

    function syncAudioTestButtons() {
      const disabled = shouldDisableAudioTestButtons();
      if (disabled === audioTestButtonsDisabled) return;
      audioTestButtonsDisabled = disabled;
      const disabledTitle = disabled ? t("audioTestUnavailableRunning") : "";
      els.browserList?.querySelectorAll("[data-audio-test-kind]").forEach((button) => {
        button.disabled = disabled;
        if (disabledTitle) {
          button.title = disabledTitle;
        } else {
          button.removeAttribute("title");
        }
      });
    }

    function syncButtons() {
      const available = controlsAvailable();
      const serverControls = serverAvailable && !standaloneMode;
      const beforeScheduledStart = isBeforeScheduledStart();
      const canPause = available && state.running && !beforeScheduledStart;
      const hasScheduledStart = els.startHours.value !== "" || els.startMinutes.value !== "";
      const canStartByTime = !state.running
        && !state.completed
        && state.elapsedBeforePause === 0
        && !state.waitingForManualStart
        && hasScheduledStart;
      els.startBtn.textContent = t("start");
      els.compactStart.textContent = t("start");
      els.startBtn.disabled = !available || state.running;
      els.compactStart.disabled = !available || state.running;
      els.scheduledStartBtn.disabled = !available || (beforeScheduledStart ? false : !canStartByTime);
      els.scheduledStartBtn.classList.toggle("stop-mode", beforeScheduledStart);
      els.scheduledStartIcon.textContent = beforeScheduledStart ? "■" : "▶";
      const scheduledActionLabel = t(beforeScheduledStart ? "stopCountdown" : "scheduledStart");
      els.scheduledStartBtn.title = scheduledActionLabel;
      els.scheduledStartBtn.setAttribute("aria-label", scheduledActionLabel);
      els.pauseBtn.disabled = !canPause;
      els.compactPause.disabled = !canPause;
      els.resetBtn.disabled = !available;
      els.compactReset.disabled = !available;
      els.languageToggle.disabled = !available;
      els.primaryToggle.disabled = !serverControls;
      els.instancesSoundToggle.disabled = !serverControls;
      els.instancesFullscreenToggle.disabled = !serverControls;
      els.festivalAnnouncementsToggle.disabled = !available;
      els.presets.forEach((button) => { button.disabled = !available; });
      [els.climbMinutes, els.breakSeconds, els.startHours, els.startMinutes]
        .forEach((input) => { input.disabled = !available; });
      els.soundProfileSelect.disabled = !available || (state.running && !beforeScheduledStart)
        || state.elapsedBeforePause > 0
        || state.completed;
      updatePrimaryPinUi();
    }

    function finalizeStandaloneState() {
      if (!standaloneMode || !state.running) return;
      if (state.countdownOnly && state.serverStartedAt <= serverNow()) {
        state.running = false;
        state.countdownOnly = false;
        state.waitingForManualStart = true;
        state.serverStartedAt = 0;
        state.elapsedBeforePause = 0;
        els.startHours.value = "";
        els.startMinutes.value = "";
        clearSignalTimers();
        syncButtons();
        return;
      }

      const settings = activeSettings();
      const duration = settings.rotationSeconds + settings.breakSeconds;
      if (!state.countdownOnly && settings.oneShot && elapsedSeconds() >= duration) {
        state.running = false;
        state.completed = true;
        state.elapsedBeforePause = duration;
        state.serverStartedAt = 0;
        syncButtons();
      }
    }

    function startStandaloneTimer() {
      const isFreshStart = state.elapsedBeforePause === 0 || state.completed || state.waitingForManualStart;
      const elapsed = isFreshStart ? 0 : state.elapsedBeforePause;
      clearSignalTimers();
      if (isFreshStart) {
        state.activeSettings = activeSettingsFromDraft();
        state.completed = false;
        lastPhaseSignalKey = "1:rotation";
        immediateStartSignal();
      }
      buildTimeline(state.activeSettings || activeSettingsFromDraft());
      state.running = true;
      state.countdownOnly = false;
      state.waitingForManualStart = false;
      state.elapsedBeforePause = 0;
      state.serverStartedAt = serverNow() - elapsed * 1000;
      state.startedAt = performance.now() - elapsed * 1000;
      lastSegmentIndex = -1;
      syncButtons();
      render();
      saveOfflineSnapshot();
    }

    function pauseStandaloneTimer() {
      state.elapsedBeforePause = elapsedSeconds();
      state.running = false;
      state.serverStartedAt = 0;
      state.pausedAt = performance.now();
      clearSignalTimers();
      syncButtons();
      render();
      saveOfflineSnapshot();
    }

    function resetStandaloneTimer(shouldSignal = false) {
      state.running = false;
      state.completed = false;
      state.countdownOnly = false;
      state.waitingForManualStart = false;
      state.serverStartedAt = 0;
      state.startedAt = 0;
      state.pausedAt = 0;
      state.accumulatedPause = 0;
      state.elapsedBeforePause = 0;
      state.activeSettings = activeSettingsFromDraft();
      lastSegmentIndex = -1;
      lastPhaseSignalKey = "";
      clearSignalTimers();
      buildTimeline(state.activeSettings);
      if (shouldSignal) signal("finish");
      syncButtons();
      render();
      saveOfflineSnapshot();
    }

    async function startTimer() {
      if (!controlsAvailable() || state.running) return;
      requestScreenWakeLock();
      unlockAudio();
      if (audioContext?.state === "suspended") audioContext.resume();
      if (standaloneMode) {
        startStandaloneTimer();
        return;
      }
      const isFreshStart = state.elapsedBeforePause === 0 || state.completed;
      const useStartAudioLead = isFreshStart && shouldUseManualStartAudioLead();
      if (isFreshStart && !useStartAudioLead) {
        lastPhaseSignalKey = "1:rotation";
        immediateStartSignal();
      }
      await pendingSeekAction;
      const sent = await sendServerAction("start", {
        settings: isFreshStart ? activeSettingsFromDraft() : activeSettings(),
        elapsedBeforePause: state.elapsedBeforePause,
        startHours: "",
        startMinutes: "",
        startMode: "manual",
        manualStart: state.waitingForManualStart,
        startAudioLead: useStartAudioLead
      }, { rescheduleSignals: true, includePhaseSignal: false });
      if (sent) {
        if (useStartAudioLead) scheduleManualStartWatchdog(state.serverStartedAt);
        return;
      }
      if (!serverAvailable) return;

      if (state.completed) {
        state.completed = false;
        state.elapsedBeforePause = 0;
      }
      if (isFreshStart) buildTimeline();
      state.running = true;
      state.completed = false;
      state.startedAt = performance.now() - (state.elapsedBeforePause * 1000);
      state.accumulatedPause = 0;
      state.pausedAt = 0;
      if (isFreshStart) {
        lastSegmentIndex = -1;
        clearSignalTimers();
      }
      syncButtons();
      render();

      if (!isFreshStart) {
        const elapsed = elapsedSeconds();
        const segment = getCurrentSegment(elapsed);
        if (segment) {
          const remaining = segment.end - elapsed;
          const duration = segment.end - segment.start;
          scheduleSegmentSignals(segment, remaining, duration, false);
        }
      }
    }

    async function startTimerByTime() {
      if (!controlsAvailable() || state.running || state.completed || state.elapsedBeforePause > 0 || state.waitingForManualStart) return;
      const hasScheduledStart = els.startHours.value !== "" || els.startMinutes.value !== "";
      if (!hasScheduledStart) return;

      requestScreenWakeLock();
      unlockAudio();
      if (audioContext?.state === "suspended") audioContext.resume();
      if (standaloneMode) {
        const now = Date.now();
        const target = new Date(now);
        target.setHours(Number(els.startHours.value || 0), Number(els.startMinutes.value || 0), 0, 0);
        state.activeSettings = activeSettingsFromDraft();
        if (target.getTime() <= now && state.activeSettings.oneShot) {
          target.setDate(target.getDate() + 1);
        }
        state.running = true;
        state.completed = false;
        state.countdownOnly = Boolean(state.activeSettings.oneShot);
        state.waitingForManualStart = false;
        state.elapsedBeforePause = 0;
        state.serverStartedAt = serverNow() + target.getTime() - now;
        buildTimeline(state.activeSettings);
        rescheduleStandaloneSignals();
        syncButtons();
        render();
        saveOfflineSnapshot();
        return;
      }
      await sendServerAction("start", {
        settings: activeSettingsFromDraft(),
        startMode: "scheduled",
        startHours: els.startHours.value,
        startMinutes: els.startMinutes.value,
        manualStart: false
      }, { rescheduleSignals: true, includePhaseSignal: false });
    }

    async function toggleScheduledCountdown() {
      if (!controlsAvailable()) return;
      if (!isBeforeScheduledStart()) {
        await startTimerByTime();
        return;
      }
      if (standaloneMode) {
        resetStandaloneTimer(false);
        return;
      }
      const stopped = await sendServerAction("stopCountdown");
      if (stopped) return;
      if (!serverAvailable) return;

      state.running = false;
      state.countdownOnly = false;
      state.waitingForManualStart = false;
      state.serverStartedAt = 0;
      state.elapsedBeforePause = 0;
      clearSignalTimers();
      syncButtons();
      render();
    }

    async function pauseTimer() {
      if (!controlsAvailable() || !state.running || isBeforeScheduledStart()) return;
      if (standaloneMode) {
        pauseStandaloneTimer();
        return;
      }
      const sent = await sendServerAction("pause");
      if (sent) return;
      if (!serverAvailable) return;

      state.elapsedBeforePause = elapsedSeconds();
      state.running = false;
      state.pausedAt = performance.now();
      clearSignalTimers();
      syncButtons();
      render();
    }

    async function hardReset(shouldSignal = true) {
      if (!controlsAvailable()) return;
      if (standaloneMode) {
        resetStandaloneTimer(shouldSignal);
        return;
      }
      const sent = await sendServerAction("reset", {
        settings: activeSettingsFromDraft()
      });
      if (sent) {
        if (sent !== "conflict" && shouldSignal) signal("finish");
        return;
      }
      if (!serverAvailable) return;

      state.running = false;
      state.completed = false;
      state.startedAt = 0;
      state.pausedAt = 0;
      state.accumulatedPause = 0;
      state.elapsedBeforePause = 0;
      state.activeSettings = null;
      lastSegmentIndex = -1;
      lastPhaseSignalKey = "";
      clearSignalTimers();
      document.body.classList.remove("break-active");
      buildTimeline();
      if (shouldSignal) signal("finish");
      syncButtons();
      render();
    }

    function setPrimaryMode(enabled) {
      return setPrimaryModeWithOptions(enabled);
    }

    async function setPrimaryModeWithOptions(enabled, options = {}) {
      if (!serverAvailable || standaloneMode) return;
      els.primaryToggle.checked = enabled;
      const changed = await sendServerAction("primary", {
        primaryClientId: enabled ? clientId : null,
        source: options.source || "",
        pin: options.pin || ""
      });
      if (changed !== true) els.primaryToggle.checked = isPrimaryClient;
      return changed;
    }

    function togglePrimaryMode() {
      setPrimaryMode(!isPrimaryClient);
    }

    function closePrimaryPinPanel() {
      els.primaryPinPanel.hidden = true;
      els.primaryPinInput.value = "";
      els.primaryPinStatus.textContent = "";
    }

    function updatePrimaryPinUi() {
      const showButton = isPrimaryClient && !standaloneMode && serverAvailable;
      els.primaryPinButton.hidden = !showButton;
      els.primaryPinButton.disabled = !showButton;
      els.primaryPinButton.classList.toggle("is-set", Boolean(state.primaryPinSet));
      els.primaryPinButton.title = state.primaryPinSet ? t("primaryPinSet") : t("primaryPinUnset");
      els.primaryPinClear.hidden = !state.primaryPinSet;
      if (!showButton) closePrimaryPinPanel();
    }

    function togglePrimaryPinPanel() {
      if (!isPrimaryClient) return;
      const nextHidden = !els.primaryPinPanel.hidden;
      els.primaryPinPanel.hidden = nextHidden;
      els.primaryPinStatus.textContent = state.primaryPinSet ? t("primaryPinSet") : t("primaryPinUnset");
      if (!nextHidden) {
        els.primaryPinInput.value = state.ownPrimaryPinValue || "";
        els.primaryPinInput.focus();
        els.primaryPinInput.select();
      }
    }

    async function savePrimaryPin() {
      if (!isPrimaryClient) return;
      const pin = els.primaryPinInput.value.trim();
      if (!/^\d{4}$/.test(pin)) {
        els.primaryPinStatus.textContent = t("primaryPinInvalid");
        els.primaryPinInput.select();
        return;
      }
      const saved = await sendServerAction("primaryPin", { pin });
      if (saved !== true) {
        els.primaryPinStatus.textContent = t("primaryPinWrong");
        return;
      }
      els.primaryPinStatus.textContent = t("primaryPinSaved");
      closePrimaryPinPanel();
    }

    async function clearPrimaryPinFromUi() {
      if (!isPrimaryClient) return;
      const cleared = await sendServerAction("primaryPin", { pin: "" });
      if (cleared !== true) return;
      els.primaryPinStatus.textContent = t("primaryPinCleared");
      closePrimaryPinPanel();
    }

    function promptPrimaryPin() {
      const pin = window.prompt(t("primaryPinPrompt"));
      if (pin === null) return null;
      const cleanPin = pin.trim();
      if (!/^\d{4}$/.test(cleanPin)) {
        window.alert(t("primaryPinInvalid"));
        return null;
      }
      return cleanPin;
    }

    function canScrub() {
      return controlsAvailable() && !state.running && !isViewerClient && state.elapsedBeforePause > 0;
    }

    function scrubToPointer(event) {
      if (!canScrub()) return;
      const segment = scrubSegment || getCurrentSegment(elapsedSeconds());
      if (!segment) return;

      const rect = els.progressTrack.getBoundingClientRect();
      const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      const duration = segment.end - segment.start;
      const segmentEnd = Math.max(segment.start, segment.end - seekEndGuardSeconds);
      const elapsed = Math.min(segmentEnd, segment.start + duration * ratio);

      state.running = false;
      state.completed = false;
      state.countdownOnly = false;
      state.waitingForManualStart = false;
      state.serverStartedAt = 0;
      state.elapsedBeforePause = elapsed;
      pendingSeekElapsed = elapsed;
      clearSignalTimers();
      render();
    }

    function startScrub(event) {
      if (!canScrub()) return;
      event.preventDefault();
      scrubSegment = getCurrentSegment(elapsedSeconds());
      if (!scrubSegment) return;
      isScrubbing = true;
      pendingSeekElapsed = null;
      els.progressTrack.setPointerCapture?.(event.pointerId);
      scrubToPointer(event);
    }

    function moveScrub(event) {
      if (!isScrubbing) return;
      scrubToPointer(event);
    }

    function stopScrub(event) {
      if (!isScrubbing) return;
      isScrubbing = false;
      scrubSegment = null;
      els.progressTrack.releasePointerCapture?.(event.pointerId);
      if (!standaloneMode && Number.isFinite(pendingSeekElapsed)) {
        pendingSeekAction = sendServerAction("seek", { elapsed: pendingSeekElapsed });
      } else if (standaloneMode && Number.isFinite(pendingSeekElapsed)) {
        saveOfflineSnapshot();
      }
      pendingSeekElapsed = null;
    }

    async function toggleFullscreen() {
      requestScreenWakeLock();
      if (!document.fullscreenElement) {
        document.body.classList.add("fullscreen");
        await document.documentElement.requestFullscreen();
      } else {
        document.body.classList.remove("fullscreen");
        await document.exitFullscreen();
      }
    }

    async function applyViewerFullscreenPreference(fromUserGesture = false) {
      if (!isViewerClient) {
        pendingViewerFullscreen = false;
        return;
      }

      if (instancesFullscreenEnabled) {
        if (document.fullscreenElement) {
          pendingViewerFullscreen = false;
          return;
        }
        if (pendingViewerFullscreen && !fromUserGesture) return;
        try {
          document.body.classList.add("fullscreen");
          await document.documentElement.requestFullscreen();
          pendingViewerFullscreen = false;
        } catch (error) {
          document.body.classList.remove("fullscreen");
          pendingViewerFullscreen = true;
          if (fromUserGesture) scheduleFitTimer();
        }
        return;
      }

      pendingViewerFullscreen = false;
      document.body.classList.remove("fullscreen");
      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {}
      }
    }

    els.presets.forEach((button) => button.addEventListener("click", () => setPreset(button.dataset.preset)));
    els.languageToggle.addEventListener("click", () => {
      if (standaloneMode) {
        applyLanguage(language === "ru" ? "en" : "ru");
        saveOfflineSnapshot();
        return;
      }
      sendServerAction("language", {
        language: language === "ru" ? "en" : "ru"
      });
    });
    els.enterStandaloneBtn.addEventListener("click", enterStandaloneMode);
    els.returnToServerBtn.addEventListener("click", returnToServerMode);
    els.browserList.addEventListener("click", async (event) => {
      const copyButton = event.target.closest("[data-copy-browser-url]");
      if (copyButton) {
        const copied = await copyText(copyButton.dataset.copyBrowserUrl);
        const feedback = copyButton.parentElement?.querySelector(".browser-copy-feedback");
        if (feedback) {
          feedback.textContent = copied ? t("copied") : "";
          window.setTimeout(() => {
            if (feedback.isConnected) feedback.textContent = "";
          }, 1400);
        }
        if (!copied) window.prompt(t("copyManually"), copyButton.dataset.copyBrowserUrl);
        return;
      }

      if (!controlsAvailable()) return;

      const legacyButton = event.target.closest("[data-legacy-mode-client]");
      if (legacyButton) {
        const targetClientId = legacyButton.dataset.legacyModeClient;
        const enabled = legacyButton.dataset.legacyModeEnabled !== "1";
        sendServerAction("legacyMode", {
          targetClientId,
          enabled
        });
        return;
      }

      const testButton = event.target.closest("[data-audio-test-kind]");
      if (testButton) {
        if (testButton.disabled || shouldDisableAudioTestButtons()) return;
        const targetClientId = testButton.dataset.audioTestClient;
        const everywhere = testAudioEverywhere && targetClientId === state.primaryClientId;
        unlockAudio();
        if (standaloneMode) {
          if (targetClientId !== clientId) return;
          const kind = testButton.dataset.audioTestKind;
          const baseTime = serverNow() + 1800 + audioUserOffsetMs;
          const offsets = kind === "warn" ? [0, 1000, 2000, 3000, 4000] : [0];
          offsets.forEach((offset) => scheduleDiagnosticSound(kind, baseTime + offset));
          return;
        }
        sendServerAction("audioTest", {
          kind: testButton.dataset.audioTestKind,
          targetClientId,
          everywhere
        });
        return;
      }

      const mark = event.target.closest("[data-audio-offset-mark]");
      if (mark) {
        const editor = mark.closest(".audio-offset-editor");
        const slider = editor?.querySelector("[data-audio-offset-slider]");
        const value = editor?.querySelector("[data-audio-offset-value]");
        pendingAudioOffset = Number(mark.dataset.audioOffsetMark);
        if (slider) slider.value = String(pendingAudioOffset);
        if (value) value.textContent = `${pendingAudioOffset > 0 ? "+" : ""}${pendingAudioOffset} ${t("ms")}`;
        return;
      }

      const chip = event.target.closest("[data-audio-client]");
      if (!chip) return;
      const targetClientId = chip.dataset.audioClient;
      const client = lastKnownClients.find((item) => item.id === targetClientId);
      const currentOffset = Number(client?.audioUserOffset || 0);
      if (editingAudioClientId !== targetClientId) {
        editingAudioClientId = targetClientId;
        pendingAudioOffset = Math.max(-500, Math.min(500, Math.round(currentOffset)));
        testAudioEverywhere = false;
        renderBrowserList(lastKnownClients);
        return;
      }

      const offset = pendingAudioOffset;
      editingAudioClientId = "";
      testAudioEverywhere = false;
      if (standaloneMode) {
        audioUserOffsetMs = offset;
        const ownClient = lastKnownClients.find((item) => item.id === targetClientId);
        if (ownClient) ownClient.audioUserOffset = offset;
        rescheduleStandaloneSignals();
        renderBrowserList(lastKnownClients);
        return;
      }
      sendServerAction("audioOffset", {
        targetClientId,
        offset
      }, { rescheduleSignals: true });
    });
    els.browserList.addEventListener("input", (event) => {
      const everywhereToggle = event.target.closest("[data-audio-test-everywhere]");
      if (everywhereToggle) {
        testAudioEverywhere = everywhereToggle.checked;
        return;
      }

      const slider = event.target.closest("[data-audio-offset-slider]");
      if (!slider) return;
      pendingAudioOffset = Number(slider.value);
      const value = slider.closest(".audio-offset-editor")?.querySelector("[data-audio-offset-value]");
      if (value) {
        value.textContent = `${pendingAudioOffset > 0 ? "+" : ""}${pendingAudioOffset} ${t("ms")}`;
      }
    });
    els.primaryToggle.addEventListener("change", () => {

    els.primaryPinButton.addEventListener("click", togglePrimaryPinPanel);
    els.primaryPinApply.addEventListener("click", savePrimaryPin);
    els.primaryPinClear.addEventListener("click", clearPrimaryPinFromUi);
    els.primaryPinInput.addEventListener("input", () => {
      els.primaryPinInput.value = els.primaryPinInput.value.replace(/\D/g, "").slice(0, 4);
      els.primaryPinStatus.textContent = "";
    });
    els.primaryPinInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        savePrimaryPin();
      }
      if (event.key === "Escape") {
        event.preventDefault();
        closePrimaryPinPanel();
