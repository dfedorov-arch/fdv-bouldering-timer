      const phaseSignalKey = `${segment.cycle}:${segment.type}`;
      if (includePhase && duration - remaining < 2 && lastPhaseSignalKey !== phaseSignalKey && !scheduledPhaseSignalKeys.has(phaseSignalKey)) {
        lastPhaseSignalKey = phaseSignalKey;
        signal(segment.type === "break" ? "end" : "start");
      }

      scheduleFestivalAnnouncements(segment, remaining);

      if (remaining > 0.2) {
        const settings = activeSettings();
        const totalDuration = settings.rotationSeconds + settings.breakSeconds;
        const finalTransition = settings.oneShot && segment.end >= totalDuration;
        schedulePhaseTransitionAt(segment, serverTimeForElapsed(segment.end), finalTransition);
      }

      if (duration > 60 && remaining > 60) {
        if (remaining > 60 + audioPrewarmSeconds) {
          scheduleSignalAt(segment, serverTimeForElapsed(segment.end - 60 - audioPrewarmSeconds), "prewarm", false);
        }
        if (remaining > 60.8) {
          scheduleSignalAt(segment, serverTimeForElapsed(segment.end - 60.8), "warm", false);
        }
        scheduleSignalAt(segment, serverTimeForElapsed(segment.end - 60), "minute", true);
      }

      if (remaining > 6) {
        if (remaining > 5 + audioPrewarmSeconds) {
          scheduleSignalAt(segment, serverTimeForElapsed(segment.end - 5 - audioPrewarmSeconds), "prewarm", false);
        }
        scheduleSegmentTimeoutAt(segment, serverTimeForElapsed(segment.end - 6), () => {
          const current = getCurrentSegment(elapsedSeconds());
          if (!current) return;
          scheduleFinalWarnings(current);
        });
      } else {
        scheduleFinalWarnings(segment);
      }
    }

    function scheduleFestivalAnnouncements(segment, remaining) {
      if (!state.festivalAnnouncements || state.activePreset !== "festival" || segment.type !== "rotation") return;
      festivalAnnouncements.forEach((announcement) => {
        if (remaining <= announcement.remaining) return;
        const targetServerTime = serverTimeForElapsed(segment.end - announcement.remaining);
        if (soundSource(announcement.kind)) {
          scheduleBufferedSignalAt(segment, targetServerTime, announcement.kind, false, false, () => {
            if (!playHtmlAudio(announcement.kind)) speak(announcement[language]);
          });
          return;
        }
        scheduleServerTimeoutAt(audioServerTime(targetServerTime), () => speak(announcement[language]));
      });
    }

    function scheduleSegmentTimeout(segment, delaySeconds, callback) {
      signalTimers.push(window.setTimeout(() => {
        const current = getCurrentSegment(elapsedSeconds());
        if (!state.running || !current) return;
        if (current.cycle !== segment.cycle || current.type !== segment.type) return;
        callback();
      }, Math.max(0, delaySeconds * 1000)));
    }

    function scheduleSegmentTimeoutAt(segment, targetServerTime, callback) {
      let cancelled = false;
      let activeTimer = null;
      const arm = () => {
        if (cancelled) return;
        const delay = delayUntilServerTime(targetServerTime);
        const wait = Math.max(0, Math.min(delay, serverTimerLookaheadSeconds));
        activeTimer = window.setTimeout(() => {
          if (cancelled) return;
          const current = getCurrentSegment(elapsedSeconds());
          if (!state.running || !current) return;
          if (current.cycle !== segment.cycle || current.type !== segment.type) return;
          if (delayUntilServerTime(targetServerTime) > 0.035) {
            arm();
            return;
          }
          callback();
        }, wait * 1000);
        signalTimers.push(activeTimer);
      };
      arm();
      return () => {
        cancelled = true;
        if (activeTimer) window.clearTimeout(activeTimer);
      };
    }

    function scheduleServerTimeoutAt(targetServerTime, callback, preserveOnTransition = false) {
      let cancelled = false;
      let activeTimer = null;
      const timerList = preserveOnTransition ? transitionSignalTimers : signalTimers;
      const forgetTimer = () => {
        if (!activeTimer) return;
        const index = timerList.indexOf(activeTimer);
        if (index >= 0) timerList.splice(index, 1);
      };
      const arm = () => {
        if (cancelled) return;
        const delay = delayUntilServerTime(targetServerTime);
        const wait = Math.max(0, Math.min(delay, serverTimerLookaheadSeconds));
        activeTimer = window.setTimeout(() => {
          forgetTimer();
          if (cancelled) return;
          if (delayUntilServerTime(targetServerTime) > 0.035) {
            arm();
            return;
          }
          callback();
        }, wait * 1000);
        timerList.push(activeTimer);
      };
      arm();
      return () => {
        cancelled = true;
        if (activeTimer) {
          window.clearTimeout(activeTimer);
          forgetTimer();
        }
      };
    }

    function scheduleFinalWarnings(segment) {
      const finalSignalKey = `${segment.cycle}:${segment.type}:final`;
      if (scheduledFinalSignalKey === finalSignalKey) return;
      scheduledFinalSignalKey = finalSignalKey;

      const remaining = segment.end - elapsedSeconds();
      if (remaining > 5.8) {
        scheduleSignalAt(segment, serverTimeForElapsed(segment.end - 5.8), "warm", false);
      }
      [5, 4, 3, 2, 1].forEach((second) => {
        if (remaining <= second) return;
        scheduleBufferedSignalAt(segment, serverTimeForElapsed(segment.end - second), "warn", true, true);
      });
    }

    function render() {
      const timeline = state.timeline.length ? state.timeline : buildTimeline();
      const elapsed = elapsedSeconds();
      const segment = getCurrentSegment(elapsed);
      const settings = activeSettings();
      const isReady = !state.running && !state.completed && state.elapsedBeforePause === 0;
      document.body.classList.toggle("scrub-ready", !state.running && !isViewerClient && !isReady);

      if (state.countdownOnly) {
        const untilStart = Math.max(0, (state.serverStartedAt - serverNow()) / 1000);
        document.body.classList.remove("break-active");
        els.phase.textContent = untilStart > 0 ? t("untilStart") : t("waitingManual");
        els.phase.className = "phase ready";
        setDisplayTime(untilStart);
        els.status.textContent = untilStart > 0 ? t("waitingStart") : t("readyStart");
        els.cycleMeta.textContent = t("final");
        els.rotationMeta.textContent = `${t("start")} ${new Date(state.serverStartedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
        els.nextMeta.textContent = untilStart > 0 ? t("nextManual") : t("pressStart");
        els.progressBar.style.width = "0%";
        els.schedule.innerHTML = `<div class="chip current"><span>${untilStart > 0 ? t("untilStart") : t("waitingManual")}</span></div>`;
        syncButtons();
        return;
      }

      if (state.running && state.serverStartedAt > serverNow()) {
        const untilStart = (state.serverStartedAt - serverNow()) / 1000;
        document.body.classList.remove("break-active");
        els.phase.textContent = t("waitingStart");
        els.phase.className = "phase ready";
        setDisplayTime(untilStart);
        els.status.textContent = t("waitingStart");
        els.cycleMeta.textContent = `${t("cycle")} 1`;
        els.rotationMeta.textContent = `${t("start")} ${new Date(state.serverStartedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
        els.nextMeta.textContent = t("nextStart");
        els.progressBar.style.width = "0%";
        drawSchedule(null);
        syncButtons();
        return;
      }

      if (state.waitingForManualStart) {
        document.body.classList.remove("break-active");
        els.phase.textContent = t("waitingManual");
        els.phase.className = "phase ready";
        setDisplayTime(0);
        els.status.textContent = t("readyStart");
        els.cycleMeta.textContent = t("final");
        els.rotationMeta.textContent = `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
        els.nextMeta.textContent = t("nextManual");
        els.progressBar.style.width = "0%";
        drawSchedule(null);
        syncButtons();
        return;
      }

      const oneShotDuration = settings.rotationSeconds + settings.breakSeconds;
      if (state.completed || (settings.oneShot && elapsed >= oneShotDuration)) {
        document.body.classList.remove("break-active");
        els.phase.textContent = t("completed");
        els.phase.className = "phase ready";
        setDisplayTime(0);
        els.status.textContent = t("completed");
        els.cycleMeta.textContent = t("final");
        els.rotationMeta.textContent = `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
        els.nextMeta.textContent = "";
        els.progressBar.style.width = "100%";
        drawSchedule(null);
        syncButtons();
        return;
      }

      if (isReady || !segment) {
        document.body.classList.remove("break-active");
        els.phase.textContent = t("readiness");
        els.phase.className = "phase ready";
        setDisplayTime(settings.rotationSeconds);
        els.status.textContent = t("ready");
        els.cycleMeta.textContent = `${t("cycle")} 1`;
        els.rotationMeta.textContent = `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
        els.nextMeta.textContent = t("nextStart");
        els.progressBar.style.width = "0%";
        drawSchedule(null);
        syncButtons();
        return;
      }

      const remaining = segment.end - elapsed;
      const duration = segment.end - segment.start;
      const donePercent = ((duration - remaining) / duration) * 100;
      const segmentKey = `${segment.cycle}:${segment.type}`;

      document.body.classList.toggle("break-active", segment.type === "break");
      els.phase.textContent = segment.label;
      els.phase.className = `phase ${segment.type}`;
      setDisplayTime(remaining);
      els.status.textContent = state.running ? t("roundRunning") : t("pause");
      els.cycleMeta.textContent = `${t("cycle")} ${segment.cycle}`;
      els.rotationMeta.textContent = segment.type === "break"
        ? `${t("break")} ${formatTime(settings.breakSeconds)}`
        : `${t("rotation")} ${formatTime(settings.rotationSeconds)}`;
      els.nextMeta.textContent = segment.type === "break"
        ? settings.oneShot ? t("nextComplete") : t("nextRotation")
        : settings.oneShot ? t("nextComplete") : settings.breakSeconds > 0 ? t("nextBreak") : t("nextRotation");
      if (settings.oneShot && segment.type === "rotation" && settings.breakSeconds > 0) {
        els.nextMeta.textContent = t("nextBreak");
      }
      els.progressBar.style.width = `${Math.max(0, Math.min(100, donePercent))}%`;
      drawSchedule(segment);

      if (state.running && segmentKey !== lastSegmentIndex) {
        lastSegmentIndex = segmentKey;
        scheduleSegmentSignals(segment, remaining, duration, true);
      }

      if (state.running && remaining <= 6) {
        scheduleFinalWarnings(segment);
      }
    }

    function tick() {
      render();
      requestAnimationFrame(tick);
    }

    function isBeforeScheduledStart() {
      return state.running
        && state.elapsedBeforePause === 0
        && state.serverStartedAt > serverNow();
    }

    function syncButtons() {
      const beforeScheduledStart = isBeforeScheduledStart();
      const canPause = state.running && !beforeScheduledStart;
      const hasScheduledStart = els.startHours.value !== "" || els.startMinutes.value !== "";
      const canStartByTime = !state.running
        && !state.completed
        && state.elapsedBeforePause === 0
        && !state.waitingForManualStart
        && hasScheduledStart;
      els.startBtn.textContent = t("start");
      els.compactStart.textContent = t("start");
      els.startBtn.disabled = state.running;
      els.compactStart.disabled = state.running;
      els.scheduledStartBtn.disabled = beforeScheduledStart ? false : !canStartByTime;
      els.scheduledStartBtn.classList.toggle("stop-mode", beforeScheduledStart);
      els.scheduledStartIcon.textContent = beforeScheduledStart ? "■" : "▶";
      const scheduledActionLabel = t(beforeScheduledStart ? "stopCountdown" : "scheduledStart");
      els.scheduledStartBtn.title = scheduledActionLabel;
      els.scheduledStartBtn.setAttribute("aria-label", scheduledActionLabel);
      els.pauseBtn.disabled = !canPause;
      els.compactPause.disabled = !canPause;
      els.soundProfileSelect.disabled = (state.running && !beforeScheduledStart)
        || state.elapsedBeforePause > 0
        || state.completed;
    }

    async function startTimer() {
      if (state.running) return;
      const isFreshStart = state.elapsedBeforePause === 0 || state.completed;
      requestScreenWakeLock();
      if (isFreshStart) {
        lastPhaseSignalKey = "1:rotation";
        immediateStartSignal();
      }
      unlockAudio();
      if (audioContext?.state === "suspended") audioContext.resume();
      const sent = await sendServerAction("start", {
        settings: isFreshStart ? activeSettingsFromDraft() : activeSettings(),
        startHours: "",
        startMinutes: "",
        manualStart: state.waitingForManualStart
      }, { rescheduleSignals: true, includePhaseSignal: false });
      if (sent) return;

      if (state.completed) {
        state.completed = false;
        state.elapsedBeforePause = 0;
      }
      if (isFreshStart) buildTimeline();
      state.running = true;
      state.completed = false;
      state.startedAt = performance.now() - (state.elapsedBeforePause * 1000);
      state.accumulatedPause = 0;
      state.pausedAt = 0;
      if (isFreshStart) {
        lastSegmentIndex = -1;
        clearSignalTimers();
      }
      syncButtons();
      render();

      if (!isFreshStart) {
        const elapsed = elapsedSeconds();
        const segment = getCurrentSegment(elapsed);
        if (segment) {
          const remaining = segment.end - elapsed;
          const duration = segment.end - segment.start;
          scheduleSegmentSignals(segment, remaining, duration, false);
        }
      }
    }

    async function startTimerByTime() {
      if (state.running || state.completed || state.elapsedBeforePause > 0 || state.waitingForManualStart) return;
      const hasScheduledStart = els.startHours.value !== "" || els.startMinutes.value !== "";
      if (!hasScheduledStart) return;

      requestScreenWakeLock();
      unlockAudio();
      if (audioContext?.state === "suspended") audioContext.resume();
      await sendServerAction("start", {
        settings: activeSettingsFromDraft(),
        startHours: els.startHours.value,
        startMinutes: els.startMinutes.value,
        manualStart: false
      }, { rescheduleSignals: true, includePhaseSignal: false });
    }

    async function toggleScheduledCountdown() {
      if (!isBeforeScheduledStart()) {
        await startTimerByTime();
        return;
      }
      const stopped = await sendServerAction("stopCountdown");
      if (stopped) return;

      state.running = false;
      state.countdownOnly = false;
      state.waitingForManualStart = false;
      state.serverStartedAt = 0;
      state.elapsedBeforePause = 0;
      clearSignalTimers();
      syncButtons();
      render();
    }

    async function pauseTimer() {
      if (!state.running || isBeforeScheduledStart()) return;
      const sent = await sendServerAction("pause");
      if (sent) return;

      state.elapsedBeforePause = elapsedSeconds();
      state.running = false;
      state.pausedAt = performance.now();
      clearSignalTimers();
      syncButtons();
      render();
    }

    async function hardReset(shouldSignal = true) {
      const sent = await sendServerAction("reset", {
        settings: activeSettingsFromDraft()
      });
      if (sent) {
        if (shouldSignal) signal("finish");
        return;
      }

      state.running = false;
      state.completed = false;
      state.startedAt = 0;
      state.pausedAt = 0;
      state.accumulatedPause = 0;
      state.elapsedBeforePause = 0;
      state.activeSettings = null;
      lastSegmentIndex = -1;
      lastPhaseSignalKey = "";
      clearSignalTimers();
      document.body.classList.remove("break-active");
      buildTimeline();
      if (shouldSignal) signal("finish");
      syncButtons();
      render();
    }

    function setPrimaryMode(enabled) {
      els.primaryToggle.checked = enabled;
      sendServerAction("primary", {
        clientId: enabled ? clientId : null
      });
    }

    function togglePrimaryMode() {
      setPrimaryMode(!isPrimaryClient);
    }

    function canScrub() {
      return !state.running && !isViewerClient && state.elapsedBeforePause > 0;
    }

    async function scrubToPointer(event) {
      if (!canScrub()) return;
      const segment = getCurrentSegment(elapsedSeconds());
      if (!segment) return;

      const rect = els.progressTrack.getBoundingClientRect();
      const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      const duration = segment.end - segment.start;
      const elapsed = segment.start + duration * ratio;

      state.elapsedBeforePause = elapsed;
      clearSignalTimers();
      render();
      sendServerAction("seek", { elapsed });
    }

    function startScrub(event) {
      if (!canScrub()) return;
      event.preventDefault();
      isScrubbing = true;
      els.progressTrack.setPointerCapture?.(event.pointerId);
      scrubToPointer(event);
    }

    function moveScrub(event) {
      if (!isScrubbing) return;
      scrubToPointer(event);
    }

    function stopScrub(event) {
      if (!isScrubbing) return;
      isScrubbing = false;
      els.progressTrack.releasePointerCapture?.(event.pointerId);
    }

    async function toggleFullscreen() {
      requestScreenWakeLock();
      if (!document.fullscreenElement) {
        document.body.classList.add("fullscreen");
        await document.documentElement.requestFullscreen();
      } else {
        document.body.classList.remove("fullscreen");
        await document.exitFullscreen();
      }
    }

    async function applyViewerFullscreenPreference(fromUserGesture = false) {
      if (!isViewerClient) {
        pendingViewerFullscreen = false;
        return;
      }

      if (instancesFullscreenEnabled) {
        if (document.fullscreenElement) {
          pendingViewerFullscreen = false;
          return;
        }
        if (pendingViewerFullscreen && !fromUserGesture) return;
        try {
          document.body.classList.add("fullscreen");
          await document.documentElement.requestFullscreen();
          pendingViewerFullscreen = false;
        } catch (error) {
          document.body.classList.remove("fullscreen");
          pendingViewerFullscreen = true;
          if (fromUserGesture) scheduleFitTimer();
        }
        return;
      }

      pendingViewerFullscreen = false;
      document.body.classList.remove("fullscreen");
      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {}
      }
    }

    els.presets.forEach((button) => button.addEventListener("click", () => setPreset(button.dataset.preset)));
    els.languageToggle.addEventListener("click", () => {
      sendServerAction("language", {
        language: language === "ru" ? "en" : "ru"
      });
    });
    els.browserList.addEventListener("click", async (event) => {
      const copyButton = event.target.closest("[data-copy-browser-url]");
      if (copyButton) {
        const copied = await copyText(copyButton.dataset.copyBrowserUrl);
        const feedback = copyButton.parentElement?.querySelector(".browser-copy-feedback");
        if (feedback) {
          feedback.textContent = copied ? t("copied") : "";
          window.setTimeout(() => {
            if (feedback.isConnected) feedback.textContent = "";
          }, 1400);
        }
        if (!copied) window.prompt(t("copyManually"), copyButton.dataset.copyBrowserUrl);
        return;
      }

      const testButton = event.target.closest("[data-audio-test-kind]");
      if (testButton) {
        const targetClientId = testButton.dataset.audioTestClient;
        const everywhere = testAudioEverywhere && targetClientId === state.primaryClientId;
        unlockAudio();
        sendServerAction("audioTest", {
          kind: testButton.dataset.audioTestKind,
          targetClientId,
          everywhere
        });
        return;
      }

      const mark = event.target.closest("[data-audio-offset-mark]");
      if (mark) {
        const editor = mark.closest(".audio-offset-editor");
        const slider = editor?.querySelector("[data-audio-offset-slider]");
        const value = editor?.querySelector("[data-audio-offset-value]");
        pendingAudioOffset = Number(mark.dataset.audioOffsetMark);
        if (slider) slider.value = String(pendingAudioOffset);
        if (value) value.textContent = `${pendingAudioOffset > 0 ? "+" : ""}${pendingAudioOffset} ${t("ms")}`;
        return;
      }

      const chip = event.target.closest("[data-audio-client]");
      if (!chip) return;
      const targetClientId = chip.dataset.audioClient;
      const client = lastKnownClients.find((item) => item.id === targetClientId);
      const currentOffset = Number(client?.audioUserOffset || 0);
      if (editingAudioClientId !== targetClientId) {
        editingAudioClientId = targetClientId;
        pendingAudioOffset = Math.max(-500, Math.min(500, Math.round(currentOffset)));
        testAudioEverywhere = false;
        renderBrowserList(lastKnownClients);
        return;
      }

      const offset = pendingAudioOffset;
      editingAudioClientId = "";
      testAudioEverywhere = false;
      sendServerAction("audioOffset", {
        targetClientId,
        offset
      }, { rescheduleSignals: true });
    });
    els.browserList.addEventListener("input", (event) => {
      const everywhereToggle = event.target.closest("[data-audio-test-everywhere]");
      if (everywhereToggle) {
        testAudioEverywhere = everywhereToggle.checked;
        return;
      }

      const slider = event.target.closest("[data-audio-offset-slider]");
      if (!slider) return;
      pendingAudioOffset = Number(slider.value);
      const value = slider.closest(".audio-offset-editor")?.querySelector("[data-audio-offset-value]");
      if (value) {
        value.textContent = `${pendingAudioOffset > 0 ? "+" : ""}${pendingAudioOffset} ${t("ms")}`;
      }
    });
    els.primaryToggle.addEventListener("change", () => {
      setPrimaryMode(els.primaryToggle.checked);
    });

    els.instancesSoundToggle.addEventListener("change", () => {
      sendServerAction("instancesSound", {
        enabled: els.instancesSoundToggle.checked
      });
    });

    els.instancesFullscreenToggle.addEventListener("change", () => {
      sendServerAction("instancesFullscreen", {
        enabled: els.instancesFullscreenToggle.checked
      });
    });

    els.festivalAnnouncementsToggle.addEventListener("change", () => {
      sendServerAction("festivalAnnouncements", {
        enabled: els.festivalAnnouncementsToggle.checked
      }, { rescheduleSignals: true });
    });

    els.soundProfileSelect.addEventListener("change", async () => {
      const previousProfile = state.soundProfile;
      unlockAudio();
      const changed = await sendServerAction("soundProfile", {
        soundProfile: els.soundProfileSelect.value
      });
      if (!changed) els.soundProfileSelect.value = previousProfile;
    });

    els.soundToggle.addEventListener("change", () => {
      if (isPrimaryClient) {
        primarySoundEnabled = els.soundToggle.checked;
        applySoundPreferenceChange();
        return;
      }

      globalSoundEnabled = els.soundToggle.checked;
      applySoundPreferenceChange();
      sendServerAction("sound", {
        enabled: globalSoundEnabled
      });
    });

    [els.climbMinutes, els.breakSeconds].forEach((input) => {
      input.addEventListener("input", () => {
        sendServerAction("settings", {
          activePreset: state.activePreset,
          settings: draftSettings()
        });
        if (state.running || state.elapsedBeforePause > 0) {
          return;
        }
        hardReset(false);
      });
    });

    function normalizeStartTimeInput(input, max) {
      const digits = input.value.replace(/\D/g, "").slice(0, 2);
      if (!digits) {
        input.value = "";
        return;
      }
      input.value = String(Math.min(max, Number(digits))).padStart(2, "0");
    }

    [els.startHours, els.startMinutes].forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 2);
        syncButtons();
      });
      input.addEventListener("blur", () => {
        normalizeStartTimeInput(input, input === els.startHours ? 23 : 59);
        sendServerAction("settings", {
          activePreset: state.activePreset,
          settings: draftSettings()
        });
      });
    });

    els.scheduledStartBtn.addEventListener("click", toggleScheduledCountdown);
    [els.startBtn, els.compactStart].forEach((button) => button.addEventListener("click", startTimer));
    [els.pauseBtn, els.compactPause].forEach((button) => button.addEventListener("click", pauseTimer));
    [els.resetBtn, els.compactReset].forEach((button) => button.addEventListener("click", () => hardReset(false)));
    els.fullBtn.addEventListener("click", toggleFullscreen);
    els.progressTrack.addEventListener("pointerdown", startScrub);
    els.progressTrack.addEventListener("pointermove", moveScrub);
    els.progressTrack.addEventListener("pointerup", stopScrub);
    els.progressTrack.addEventListener("pointercancel", stopScrub);
    ["pointerdown", "touchstart", "click"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => {
        if (event.target.closest(".action")) return;
        unlockAudio();
        if (pendingViewerFullscreen && isViewerClient && instancesFullscreenEnabled) {
          applyViewerFullscreenPreference(true);
        }
      }, { passive: true });
    });

    document.addEventListener("keydown", (event) => {
      unlockAudio();
      const key = event.key.toLowerCase();
      const isCtrl = event.ctrlKey || event.metaKey;
      const isPrimaryShortcut = isCtrl && (event.code === "KeyM" || key === "m" || key === "ь");
      if (isPrimaryShortcut) {
        event.preventDefault();
        togglePrimaryMode();
        return;
      }
      if (isViewerClient) return;
      const isPauseShortcut = isCtrl && (event.code === "KeyQ" || key === "q" || key === "й");
      const isFullscreenShortcut = isCtrl && (event.code === "KeyF" || key === "f" || key === "а");
      if (isPauseShortcut) {
        event.preventDefault();
        pauseTimer();
        return;
      }
      if (isFullscreenShortcut) {
        event.preventDefault();
        toggleFullscreen();
        return;
      }
      if (key === "z" || key === "я") {
        event.preventDefault();
        if (!state.running) startTimer();
        return;
      }
      if (key === "p" || key === "з") {
        event.preventDefault();
        hardReset(false);
        return;
      }
    });

    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("fullscreen", Boolean(document.fullscreenElement));
      if (isViewerClient && instancesFullscreenEnabled && !document.fullscreenElement) {
        pendingViewerFullscreen = true;
      }
      scheduleFitTimer();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") resumeClientSync();
    });

    window.addEventListener("pageshow", resumeClientSync);
    window.addEventListener("focus", resumeClientSync);
    window.addEventListener("online", resumeClientSync);

    window.addEventListener("resize", scheduleFitTimer);
    if ("ResizeObserver" in window) {
      const timerResizeObserver = new ResizeObserver(scheduleFitTimer);
      timerResizeObserver.observe(document.querySelector(".stage"));
      timerResizeObserver.observe(document.querySelector(".timer-wrap"));
    }

    buildTimeline();
    render();
    scheduleFitTimer();
    tick();
    startSync();
    requestScreenWakeLock();
  </script>
</body>
</html>
